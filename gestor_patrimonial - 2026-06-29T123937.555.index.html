<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor Patrimonial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --c-bg:#F7F6F3;--c-surface:#FFFFFF;--c-border:#E4E2DC;--c-border2:#CCCAC2;
  --c-text:#1A1917;--c-text2:#6B6860;--c-text3:#9E9C96;
  --c-green:#1A7A52;--c-green-light:#E8F5EE;--c-green-mid:#2E9E6A;
  --c-blue:#1A4F8A;--c-blue-light:#EBF2FB;
  --c-amber:#8A5A00;--c-amber-light:#FDF3DC;
  --c-red:#8A1A1A;--c-red-light:#FDEBEB;
  --c-purple:#4A2E8A;--c-purple-light:#F0EDFB;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--c-text);background:var(--c-bg);min-height:100vh}

/* LAYOUT */
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;height:100vh}
.sidebar{background:var(--c-surface);border-right:1px solid var(--c-border);display:flex;flex-direction:column;padding:0;overflow-y:auto;height:100vh;position:sticky;top:0}
.main{overflow-y:auto;height:100vh}

/* SIDEBAR */
.sb-header{padding:20px 16px 12px;border-bottom:1px solid var(--c-border)}
.sb-logo{font-size:15px;font-weight:600;color:var(--c-text);letter-spacing:-.3px}
.sb-logo span{color:var(--c-green-mid)}
.sb-sub{font-size:11px;color:var(--c-text3);margin-top:2px;font-family:'DM Mono',monospace}
.sb-section{padding:12px 10px 4px;font-size:10px;font-weight:600;color:var(--c-text3);letter-spacing:.06em;text-transform:uppercase}
.sb-client{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;margin:1px 6px;transition:background .12s}
.sb-client:hover{background:var(--c-bg)}
.sb-client.active{background:var(--c-green-light)}
.sb-client .av{width:28px;height:28px;border-radius:50%;background:var(--c-green-light);color:var(--c-green);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-client.active .av{background:var(--c-green-mid);color:#fff}
.sb-client-name{font-size:13px;font-weight:500;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-client-sub{font-size:10px;color:var(--c-text3)}
.sb-client.active .sb-client-name{color:var(--c-green)}
.sb-actions{padding:12px 10px;border-top:1px solid var(--c-border);margin-top:16px;display:flex;flex-direction:column;gap:6px}
.sb-btn{width:100%;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--c-border);background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--c-text2);text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.sb-btn:hover{background:var(--c-bg)}
.sb-btn.primary{background:var(--c-green-mid);color:#fff;border-color:var(--c-green-mid)}
.sb-btn.primary:hover{background:var(--c-green)}

/* MAIN HEADER */
.main-header{padding:20px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.client-title{font-size:22px;font-weight:600;letter-spacing:-.4px}
.client-title-sub{font-size:13px;color:var(--c-text2);margin-top:3px}
.header-actions{display:flex;gap:8px;flex-shrink:0}

/* BUTTONS */
.btn{border:1px solid var(--c-border2);border-radius:var(--radius);padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;background:var(--c-surface);color:var(--c-text);font-family:'DM Sans',sans-serif;transition:background .12s,border-color .12s;white-space:nowrap}
.btn:hover{background:var(--c-bg)}
.btn.green{background:var(--c-green-mid);color:#fff;border-color:var(--c-green-mid)}
.btn.green:hover{background:var(--c-green)}
.btn.blue{background:var(--c-blue);color:#fff;border-color:var(--c-blue)}
.btn.blue:hover{background:#0F3A6E}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.amber{background:transparent;color:var(--c-amber);border-color:#D4A84B}
.btn.amber:hover{background:var(--c-amber-light)}
.btn.danger{background:transparent;color:var(--c-red);border-color:#D4A0A0}
.btn.danger:hover{background:var(--c-red-light)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--c-text2)}
.btn.ghost:hover{background:var(--c-bg)}

/* TABS */
.tabs-wrap{padding:16px 28px 0;border-bottom:1px solid var(--c-border);display:flex;gap:2px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--c-text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'DM Sans',sans-serif;transition:color .12s}
.tab.on{color:var(--c-green);border-bottom-color:var(--c-green-mid)}
.tab:hover{color:var(--c-text)}
.panel{display:none;padding:20px 28px 32px}.panel.on{display:block}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.kpi .l{font-size:11px;color:var(--c-text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.kpi .v{font-size:20px;font-weight:600;color:var(--c-text);letter-spacing:-.5px}
.kpi .v.g{color:var(--c-green)}.kpi .v.a{color:var(--c-amber)}.kpi .v.r{color:var(--c-red)}.kpi .v.b{color:var(--c-blue)}

/* CARDS */
.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-xl);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;color:var(--c-text)}

/* BADGES */
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.02em}
.b-ok{background:var(--c-green-light);color:var(--c-green)}.b-warn{background:var(--c-amber-light);color:var(--c-amber)}
.b-exp{background:var(--c-red-light);color:var(--c-red)}.b-fut{background:var(--c-bg);color:var(--c-text2)}
.chip.venc{background:var(--c-bg);border-color:var(--c-border)}
.b-var{background:var(--c-purple-light);color:var(--c-purple)}
.tipo-tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;border:1px solid}
.tt-ren{background:var(--c-blue-light);color:var(--c-blue);border-color:#B5D0F0}
.tt-gar{background:var(--c-green-light);color:var(--c-green);border-color:#A0D4BB}
.tt-var{background:var(--c-purple-light);color:var(--c-purple);border-color:#C5B8F0}

/* LÍNEAS */
.linea-row{padding:14px 0;border-bottom:1px solid var(--c-border)}
.linea-row:last-child{border-bottom:none;padding-bottom:0}
.linea-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.linea-name{font-size:13px;font-weight:600}
.linea-renta{font-size:12px;color:var(--c-green);font-weight:500}

/* CHAIN */
.chain{display:flex;align-items:flex-start;flex-wrap:wrap;gap:6px}
.arr{color:var(--c-text3);font-size:14px;padding:0 2px;margin-top:14px;flex-shrink:0}
.chip{border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:8px 10px;font-size:11px;cursor:pointer;min-width:120px;max-width:160px;transition:border-color .12s,box-shadow .12s;background:var(--c-surface)}
.chip:hover{border-color:var(--c-border2);box-shadow:var(--shadow)}
.chip.act{border-color:var(--c-green-mid);background:var(--c-green-light)}
.chip.venc{opacity:.55}.chip.fut{border-style:dashed}
.chip-prod{font-weight:600;color:var(--c-text);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.chip-tae{font-size:13px;font-weight:600;color:var(--c-green-mid);line-height:1}
.chip-tae.var{color:var(--c-purple)}
.chip-d{color:var(--c-text3);font-size:10px;margin-top:2px;font-family:'DM Mono',monospace}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{font-size:10px;font-weight:600;color:var(--c-text3);text-align:left;padding:8px 8px;border-bottom:1px solid var(--c-border);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 8px;border-bottom:1px solid var(--c-border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--c-bg)}

/* BARS ANUAL */
.year-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.year-lbl{font-size:12px;font-weight:600;color:var(--c-text2);width:42px;flex-shrink:0;font-family:'DM Mono',monospace}
.bar-wrap{flex:1;background:var(--c-bg);border-radius:4px;height:26px;overflow:hidden;position:relative;border:1px solid var(--c-border)}
.bar-cap{position:absolute;left:0;top:0;height:100%;background:#B5D4F4;border-radius:4px}
.bar-ren{position:absolute;left:0;top:0;height:100%;background:var(--c-green-mid);opacity:.6;border-radius:4px}
.bar-val{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:var(--c-text);font-family:'DM Mono',monospace}

/* CHART */
.chart-wrap{position:relative;width:100%;height:280px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--c-text2)}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,25,23,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-xl);padding:22px;width:400px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px}
.info-box{background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--c-text2);margin-bottom:12px}
.info-box strong{color:var(--c-text);font-weight:600}
.mrow{margin-bottom:10px}
.mrow label{font-size:11px;font-weight:600;color:var(--c-text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.mrow input,.mrow select{width:100%;padding:8px 10px;border:1px solid var(--c-border2);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--c-text);background:var(--c-surface);transition:border-color .12s}
.mrow input:focus,.mrow select:focus{outline:none;border-color:var(--c-green-mid)}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--c-border)}
.divider{height:1px;background:var(--c-border);margin:10px 0}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--c-text3)}
.empty .icon{font-size:32px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.6}

/* SAVE INDICATOR */
.save-toast{position:fixed;bottom:20px;right:20px;background:var(--c-text);color:#fff;padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:'DM Sans',sans-serif}
.save-toast.show{opacity:1}

@media(max-width:640px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .panel{padding:16px}
  .main-header{padding:16px 16px 0}
  .tabs-wrap{padding:0 16px}
}

/* PRINT AREA */
#print-area{display:none;position:fixed;inset:0;background:#fff;z-index:1000;overflow-y:auto}
.print-toolbar{position:sticky;top:0;background:#F7F6F3;border-bottom:1px solid #E4E2DC;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.print-body{padding:36px 40px;max-width:1000px;margin:auto;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#1A1917}
.print-body h1{font-size:20px;font-weight:700;margin-bottom:4px}
.print-body .meta{font-size:12px;color:#6B6860;margin-bottom:20px}
.print-body .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.print-body .kpi{border:1px solid #E4E2DC;border-radius:8px;padding:10px 14px;min-width:130px;background:#FAFAF8}
.print-body .kl{font-size:10px;color:#9E9C96;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px}
.print-body .kv{font-size:16px;font-weight:700}
.print-body h2{font-size:13px;font-weight:700;margin:20px 0 8px;border-bottom:2px solid #E4E2DC;padding-bottom:5px}
.print-body table{width:100%;border-collapse:collapse;font-size:11px}
.print-body th{background:#F7F6F3;padding:7px 6px;border-bottom:2px solid #E4E2DC;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#6B6860;font-weight:600}
.print-body td{padding:6px 6px;border-bottom:1px solid #F0EEE8;font-family:Arial,sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.print-body .r{text-align:right;font-family:monospace}
.print-body .c{text-align:center;font-family:monospace}
.print-body .g{color:#1A7A52}
.print-body .b{font-weight:700}
.print-body .footer{margin-top:28px;font-size:10px;color:#9E9C96;border-top:1px solid #E4E2DC;padding-top:12px;line-height:1.7}
@media print{
  .app,.print-toolbar{display:none!important}
  #print-area{position:static!important;overflow:visible!important}
  .print-body{padding:16px 20px}
}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--c-bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-card{background:#fff;border:1px solid var(--c-border);border-radius:20px;padding:40px 36px;width:380px;max-width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-logo{font-size:17px;font-weight:600;color:var(--c-text);letter-spacing:-.3px;margin-bottom:4px}
.login-logo span{color:var(--c-green-mid)}
.login-icon{font-size:40px;margin:16px 0}
.login-title{font-size:18px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--c-text3);margin-bottom:24px;line-height:1.5}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--c-border2);border-radius:10px;font-size:16px;text-align:center;letter-spacing:3px;font-family:'DM Mono',monospace;outline:none;transition:border .15s;margin-bottom:10px}
.login-input:focus{border-color:var(--c-green-mid)}
.login-btn{width:100%;padding:12px;background:var(--c-green-mid);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;margin-bottom:8px}
.login-btn:hover{background:var(--c-green)}
.login-err{color:var(--c-red);font-size:12px;margin-top:4px;min-height:18px}
.login-hint{font-size:11px;color:var(--c-text3);margin-top:14px;line-height:1.6}
#app-root{display:none}
</style>

<body>

<!-- PANTALLA DE LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Patrimonio<span>•</span></div>
    <div class="login-icon">🔐</div>
    <div class="login-title">Acceso seguro</div>
    <div class="login-sub">Introduce tu contraseña para acceder al gestor patrimonial</div>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')intentarAcceso()">
    <button class="login-btn" onclick="intentarAcceso()">Acceder</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-hint" id="login-hint"></div>
  </div>
</div>

<!-- APP PRINCIPAL (oculta hasta login) -->
<div id="app-root" class="app">
  <aside class="sidebar">
    <div class="sb-header" onclick="state.activeId=null;renderAll()" style="cursor:pointer" title="Ir al resumen">
      <div class="sb-logo">Patrimonio<span>•</span></div>
      <div class="sb-sub">Gestor de inversiones</div>
    </div>
    <div class="sb-section">Clientes</div>
    <div id="sb-clients"></div>
    <div class="sb-section" style="margin-top:8px">Vistas globales</div>
    <div style="padding:0 10px 4px">
      <button class="sb-btn" id="sb-btn-venc" onclick="verVencimientos()" style="width:100%;text-align:left;display:flex;align-items:center;gap:6px">📅 Control de vencimientos</button>
    </div>
    <div style="padding:0 10px 4px">
      <button class="sb-btn" id="sb-btn-prov" onclick="verProveedores()" style="width:100%;text-align:left;display:flex;align-items:center;gap:6px">🏢 Vista por proveedores</button>
    </div>
    <div style="padding:0 10px 8px">
      <button class="sb-btn" id="sb-btn-com" onclick="verComisiones()" style="width:100%;text-align:left;display:flex;align-items:center;gap:6px">💶 Mis comisiones</button>
    </div>
    <div style="padding:0 10px 8px">
      <button class="sb-btn" id="sb-btn-colab" onclick="verColaboradores()" style="width:100%;text-align:left;display:flex;align-items:center;gap:6px">👥 Colaboradores</button>
    <div class="sb-section" style="margin-top:8px">Productos</div>
    <div id="sb-productos" style="padding:0 6px 4px"></div>
    <div style="padding:0 10px 8px">
      <button class="sb-btn" onclick="showModal('gestionar-productos')" style="width:100%;text-align:left">+ Gestionar productos</button>
    </div>
    <div class="sb-actions">
      <button class="sb-btn primary" onclick="showModal('nuevo-cliente')">+ Nuevo cliente</button>
      <button class="sb-btn" onclick="exportJSON()">Exportar copia de seguridad</button>
      <button class="sb-btn" onclick="showModalFusionar()">🔀 Fusionar clientes</button>
      <button class="sb-btn" onclick="document.getElementById('import-file').click()">Importar datos</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(this)">
      <button class="sb-btn" onclick="importarPreIPOsExcel()" style="background:var(--c-green-light);color:var(--c-green);font-weight:600">⬆ Importar Pre IPO Excel</button>
      <button class="sb-btn" onclick="importarPreIPORentasExcel()" style="background:#EDF4FF;color:var(--c-blue);font-weight:600">⬆ Importar Pre IPO Rentas</button>
      <button class="sb-btn" onclick="aplicarComisionesDepOro()" style="background:#FFF8E6;color:#8A6200;font-weight:600">💛 Comisiones Depósito Oro</button>
      <button class="sb-btn" onclick="aplicarComisionesEnergia()" style="background:#FFF3E0;color:#E65100;font-weight:600">⚡ Comisiones Energía</button>
      <button class="sb-btn" onclick="regenerarComisionesPescados()" style="background:#E0F7FA;color:#006064;font-weight:600">🐟 Regenerar Pescados</button>
      <button class="sb-btn" onclick="exportarBackupAutomatico()" style="color:var(--c-green);border-color:var(--c-green-light);font-weight:600">💾 Exportar backup</button>
      <button class="sb-btn" onclick="cerrarSesion()" style="color:var(--c-red);border-color:var(--c-red-light)">🔒 Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div id="main-content"></div>
  </main>

function calcRenta(cap,tae,ini,fin,capitaliz,rentaTipo,iniRef,finRef){
  // rentaTipo: "anual" (TAE, por defecto) o "plazo" (% total sobre el plazo completo)
  // Si es "plazo", calculamos qué proporción del plazo total ha transcurrido y aplicamos pro-rata
  const y=Math.max(0,anios(ini,fin));
  if(rentaTipo==="plazo"){
    // El % introducido es la rentabilidad total del plazo completo (de iniRef a finRef)
    const plazoTotal=Math.max(0.0001,anios(iniRef||ini,finRef||fin));
    const proporcion=y/plazoTotal; // fracción del plazo transcurrida
    const rentaTotal=cap*(tae/100);
    if(capitaliz==="pago_mensual")return rentaTotal; // total pagado a lo largo del plazo
    return rentaTotal*proporcion;
  }
  // rentaTipo === "anual" (TAE)
  if(capitaliz==="simple")return cap*(tae/100)*y;
  if(capitaliz==="pago_mensual")return cap*(tae/100)*y;
  if(capitaliz==="anual")return cap*(Math.pow(1+tae/100,y)-1);
  if(capitaliz==="mensual"){const m=y*12;return cap*(Math.pow(1+tae/100/12,m)-1);}
  return 0;
}
function esPagoMensual(capitaliz){return capitaliz==="pago_mensual";}
function rentaMes(cap,tae,t){
  const tp=t?TIPOS[t.tipo]||{}:{};
  if(tp.taeEsMensual)return cap*(tae/100); // ya es mensual
  return cap*(tae/100)/12;
}
// Versión con tramo directamente
function rentaMesT(cap,t){return rentaMes(cap,t.tae,t);}

// Genera todas las fechas de cobro de un tramo de pago mensual
// diaCobro: día del mes en que se cobra (por defecto 8)
// primerCobro: "siguiente" (mes siguiente completo) o "prorrata" (mes siguiente cobrando días desde contratación)
function fechasPagos(t){
  const dia=t.diaCobro||8;
  const primer=t.primerCobro||"siguiente";
  const dIni=new Date(t.ini);
  const dVen=new Date(t.ven);
  const pagos=[];

  // Determinar mes del primer cobro
  // "siguiente": primer cobro = mes siguiente al de contratación, día 'dia'
  // "prorrata":  primer cobro = mismo mes si aún no ha pasado el día 'dia', si no mes siguiente
  let mesInicio=new Date(dIni.getFullYear(), dIni.getMonth(), dia);
  if(primer==="siguiente"){
    // Siempre el mes siguiente
    mesInicio=new Date(dIni.getFullYear(), dIni.getMonth()+1, dia);
  } else {
    // Prorrata: si el día de cobro ya pasó este mes, el primer cobro es el mes siguiente
    if(dIni.getDate()>=dia){
      mesInicio=new Date(dIni.getFullYear(), dIni.getMonth()+1, dia);
    }
    // Si no ha pasado, cobra este mismo mes (prorrata de días)
  }

  let cur=new Date(mesInicio);
  while(cur<=dVen){
    pagos.push(cur.toISOString().split("T")[0]);
    cur=new Date(cur.getFullYear(), cur.getMonth()+1, dia);
  }
  return pagos;
}

// Cuenta cuántos pagos mensuales se han producido hasta 'hasta' (inclusive)
function mesesCobrados(ini,hasta,t){
  if(t){
    // Usar fechasPagos si tenemos el tramo completo (con diaCobro y primerCobro)
    const pagos=fechasPagos(t);
    return pagos.filter(f=>f<=hasta).length;
  }
  // Fallback sin tramo: día 8, mes siguiente
  const dHasta=new Date(hasta);
  const dIni=new Date(ini);
  let count=0;
  let cur=new Date(dIni.getFullYear(),dIni.getMonth()+1,8);
  while(cur<=dHasta){count++;cur=new Date(cur.getFullYear(),cur.getMonth()+1,8);}
  return count;
}
function capIni(l,ti){
  if(ti===0)return l.tramos[0].cap||0;
  // Si el tramo tiene capital explícito (ampliación), usarlo
  if(l.tramos[ti]?.cap!=null&&l.tramos[ti].cap>0)return l.tramos[ti].cap;
  return capFinT(l,ti-1);
}

// Capital activo de una línea a fecha h (solo el tramo vigente, no los vencidos ni futuros)
function capActivoLinea(l,h){
  if(!l.tramos.length)return 0;
  const hh=h||hoy();
  // Buscar el tramo activo (ya empezó, no ha vencido, no tiene sucesor activo)
  let tramoActivo=null, tiActivo=-1;
  l.tramos.forEach((t,ti)=>{
    if(t.cancelado)return; // cancelados no son activos
    if(t.ini&&t.ini.slice(0,7)>hh.slice(0,7))return;
    const esIndef=!t.ven||t.ven.startsWith("2099")||t.capitaliz==="variable";
    if(!esIndef&&t.ven<=hh)return;
    const sig=l.tramos[ti+1];
    if(sig&&sig.ini<=hh)return;
    tramoActivo=t; tiActivo=ti;
  });
  if(!tramoActivo)return 0;
  const ci=capIni(l,tiActivo);
  // Para Publicidad que capitaliza, devolver el valor acumulado hasta hoy
  if(esRenta45(tramoActivo)&&(tramoActivo.modalidad45||"cobrar")==="capitalizar"){
    return valCap45En(ci,tramoActivo.tae,tramoActivo.ini,tramoActivo.ven,hh,tramoActivo.periodoCapitalizaDesde);
  }
  return ci;
}

// ─── RENTA 45 DÍAS ───────────────────────────────────────────────────────────
// Genera todas las fechas de cobro/capitalización cada 45 días
function fechasPagos45(t){
  const dIni=new Date(t.ini);
  const dVen=new Date(t.ven);
  const pagos=[];
  let cur=new Date(dIni.getTime()+45*864e5); // primer pago 45 días después del inicio
  while(cur<=dVen){
    pagos.push(cur.toISOString().split("T")[0]);
    cur=new Date(cur.getTime()+45*864e5);
  }
  return pagos;
}

// Rentabilidad de cada periodo de 45 días: capital × (tipo/100)
// El tipo introducido es el % por cada periodo de 45 días (NO TAE anual)
// Ej: 15.000 € al 8% → 15.000 × 0.08 = 1.200 € cada 45 días
function rentaPeriodo45(cap,tae){
  return cap*(tae/100);
}

// Capital final acumulado con capitalización 45 días
// Si periodoCapitalizaDesde > 1, los primeros N-1 periodos se cobran (capital fijo)
function capFin45(capInicial,tae,ini,ven,periodoCapitalizaDesde){
  const desde=periodoCapitalizaDesde||1;
  const pagos=fechasPagos45({ini,ven});
  let cap=capInicial;
  pagos.forEach((_,i)=>{
    const periodo=i+1;
    if(periodo>=desde) cap+=rentaPeriodo45(cap,tae); // capitaliza
    // si periodo < desde: cobra (el capital no crece)
  });
  return cap;
}

// Valor acumulado en fecha f con capitalización 45 días (respetando periodoCapitalizaDesde)
function valCap45En(capInicial,tae,ini,ven,f,periodoCapitalizaDesde){
  const desde=periodoCapitalizaDesde||1;
  const pagos=fechasPagos45({ini,ven}).filter(p=>p<=f);
  let cap=capInicial;
  pagos.forEach((_,i)=>{
    const periodo=i+1;
    if(periodo>=desde) cap+=rentaPeriodo45(cap,tae);
  });
  return cap;
}

// Rentas cobradas (modalidad "cobrar" o periodos previos a capitalización) hasta fecha f
function rentasCobradas45En(capInicial,tae,ini,ven,f,periodoCapitalizaDesde){
  const desde=periodoCapitalizaDesde||1;
  const pagos=fechasPagos45({ini,ven}).filter(p=>p<=f);
  let renta=0;
  pagos.forEach((_,i)=>{
    const periodo=i+1;
    if(periodo<desde) renta+=rentaPeriodo45(capInicial,tae); // cobros anteriores (capital fijo)
  });
  return renta;
}

function esRenta45(t){return (TIPOS[t.tipo]||{}).renta45===true;}
// ─────────────────────────────────────────────────────────────────────────────
function capFinT(l,ti){
  const t=l.tramos[ti],c=capIni(l,ti),tp=TIPOS[t.tipo]||{};
  if(t.capitaliz==="variable") return t.valorFecha||c;
  if(esRenta45(t)){
    if((t.modalidad45||"cobrar")==="capitalizar") return capFin45(c,t.tae,t.ini,t.ven,t.periodoCapitalizaDesde);
    return c; // cobrar puro: capital no crece
  }
  if(tp.rentaMensual||esPagoMensual(t.capitaliz))return c;
  return c+calcRenta(c,t.tae,t.ini,t.ven,t.capitaliz,t.rentaTipo,t.ini,t.ven);
}
function rentaAcumT(l,ti){
  const t=l.tramos[ti],c=capIni(l,ti),tp=TIPOS[t.tipo]||{};
  if(t.capitaliz==="variable") return (t.valorFecha||c)-c;
  if(esRenta45(t)){
    if((t.modalidad45||"cobrar")==="capitalizar"){
      const desde=t.periodoCapitalizaDesde||1;
      const pagos=fechasPagos45(t);
      // Rentas cobradas antes de capitalizar + capital acumulado al final - capital inicial
      let capAcum=c;
      let rentasCobradas=0;
      pagos.forEach((_,i)=>{
        const periodo=i+1;
        if(periodo>=desde) capAcum+=rentaPeriodo45(capAcum,t.tae);
        else rentasCobradas+=rentaPeriodo45(c,t.tae);
      });
      return rentasCobradas+(capAcum-c);
    }
    return fechasPagos45(t).length*rentaPeriodo45(c,t.tae);
  }
  if(tp.rentaMensual||esPagoMensual(t.capitaliz))return calcRenta(c,t.tae,t.ini,t.ven,"simple",t.rentaTipo,t.ini,t.ven);
  return calcRenta(c,t.tae,t.ini,t.ven,t.capitaliz,t.rentaTipo,t.ini,t.ven);
}

function rentaAcumT_hoy(l,ti,f){
  const t=l.tramos[ti],c=capIni(l,ti),tp=TIPOS[t.tipo]||{};
  const hasta=f<t.ven?f:t.ven;
  if(t.capitaliz==="variable") return (t.valorFecha||c)-c;
  if(esRenta45(t)){
    if((t.modalidad45||"cobrar")==="capitalizar"){
      const desde=t.periodoCapitalizaDesde||1;
      const pagos=fechasPagos45(t).filter(p=>p<=hasta);
      let capAcum=c, rentasCob=0;
      pagos.forEach((_,i)=>{
        const periodo=i+1;
        if(periodo>=desde) capAcum+=rentaPeriodo45(capAcum,t.tae);
        else rentasCob+=rentaPeriodo45(c,t.tae);
      });
      return rentasCob+(capAcum-c);
    }
    const nPagos=fechasPagos45(t).filter(p=>p<=hasta).length;
    return nPagos*rentaPeriodo45(c,t.tae);
  }
  if(tp.rentaMensual||esPagoMensual(t.capitaliz)){
    const mc=mesesCobrados(t.ini,hasta,t);
    return rentaMesT(c,t)*mc;
  }
  return f>=t.ven?calcRenta(c,t.tae,t.ini,t.ven,t.capitaliz,t.rentaTipo,t.ini,t.ven):0;
}
function valLineaEn(l,f){
  for(let i=0;i<l.tramos.length;i++){
    const t=l.tramos[i],tp=TIPOS[t.tipo]||{};
    if(f<t.ini) return i===0?0:capFinT(l,i-1);
    if(t.capitaliz==="variable") return t.valorFecha||capIni(l,i);
    if(f>=t.ini&&f<t.ven){
      const c=capIni(l,i);
      if(esRenta45(t)){
        if((t.modalidad45||"cobrar")==="capitalizar"){
          return valCap45En(c,t.tae,t.ini,t.ven,f,t.periodoCapitalizaDesde);
        } else {
          const nPagos=fechasPagos45(t).filter(p=>p<=f).length;
          return c + nPagos*rentaPeriodo45(c,t.tae);
        }
      }
      if(tp.rentaMensual||esPagoMensual(t.capitaliz)) return c;
      return c;
    }
    if(f>=t.ven){
      if(i===l.tramos.length-1) return capFinT(l,i);
    }
  }
  return capFinT(l,l.tramos.length-1);
}

function rentaCobradaMensual(l,f){
  // Rentas mensuales ya cobradas hasta la fecha f (meses completos)
  let total=0;
  for(let i=0;i<l.tramos.length;i++){
    const t=l.tramos[i],tp=TIPOS[t.tipo]||{};
    if(!(tp.rentaMensual||esPagoMensual(t.capitaliz)))continue;
    if(f<t.ini)continue;
    const hasta=f<t.ven?f:t.ven;
    const mesesCompletos=mesesCobrados(t.ini,hasta,t);
    total+=rentaMesT(capIni(l,i),t)*mesesCompletos;
  }
  return total;
}

function rentaMensLinea(l,f){
  // Devuelve la renta mensual esperada del tramo activo (para el KPI de rentas/mes)
  for(let i=0;i<l.tramos.length;i++){
    const t=l.tramos[i],tp=TIPOS[t.tipo]||{};
    if(f>=t.ini&&f<t.ven&&(tp.rentaMensual||esPagoMensual(t.capitaliz)))
      return rentaMesT(capIni(l,i),t);
  }
  return 0;
}
function estT(t){
  const h=hoy(),d=dias(h,t.ven),tp=TIPOS[t.tipo]||{};
  if(t.cancelado)return{txt:"Cancelado",cls:"b-exp"};
  if(t.capitaliz==="variable")return{txt:"Activo",cls:"b-var"};
  if(t.ven<h)return{txt:"Vencido",cls:"b-exp"};
  if(t.ini>h)return{txt:"Futuro",cls:"b-fut"};
  if(d<=30)return{txt:"Próx. vto.",cls:"b-warn"};
  if(!tp.garantizado)return{txt:"Activo",cls:"b-var"};
  return{txt:"Activo",cls:"b-ok"};
}

  const ordProv=["Triple A","The Real Money","Make a Mark","Inversus","Hypocampos","Otros"];

  clientes.forEach(cl=>{
    (cl.lineas||[]).forEach(l=>{
      const ci=capActivoLinea(l,h);
      if(ci>0){
        // Usar el tramo activo para determinar el proveedor
        const tramoAct=l.tramos.find((t,ti)=>{
          if(t.ini>h)return false;
          const esIndef=!t.ven||t.ven.startsWith("2099");
          if(!esIndef&&t.ven<=h)return false;
          const sig=l.tramos[ti+1];
          if(sig&&sig.ini<=h)return false;
          return true;
        })||l.tramos[l.tramos.length-1];
        const tp=TIPOS[tramoAct?.tipo]||{};
        const prov=proveedorDeTramo(tramoAct||{},tp);
        capTotal+=ci;
        if(!porProv[prov])porProv[prov]={cap:0};
        porProv[prov].cap+=ci;
        // Próximos vencimientos — solo último tramo activo

    });
  });

  proxVenc.sort((a,b)=>a.d-b.d);

  const mesActual=h.slice(0,7);
  const anio2026="2026";
  const anio2027="2027";
  const fmtMes=m=>{
    const [y,mo]=m.split("-");

  };
  const fmtF=f=>f?f.split("-").reverse().join("/"):"—";

  // Comisiones del mes actual por proveedor
  const comMesActual={};
  // Pendientes 2026 y 2027 por proveedor
  const com2026={}, com2027={};

  pagosAll.forEach(p=>{
    const mes=p.fecha.slice(0,7);
    const anio=p.fecha.slice(0,4);
    const prov=p.prov;

    if(mes===mesActual){

      comMesActual[prov]+=p.importe;
    }
    if(anio===anio2026){
      if(!com2026[prov])com2026[prov]=0;
      com2026[prov]+=p.importe;
    }
    if(anio===anio2027){
      if(!com2027[prov])com2027[prov]=0;
      com2027[prov]+=p.importe;
    }
  });

  const totalMes=Object.values(comMesActual).reduce((s,v)=>s+v,0);
  const total2026=Object.values(com2026).reduce((s,v)=>s+v,0);
  const total2027=Object.values(com2027).reduce((s,v)=>s+v,0);

  // ── Render ────────────────────────────────────────────────────────────────
  cont.innerHTML=`<div style="padding:24px 28px 32px;max-width:1100px">

    <!-- Header -->
    <div style="margin-bottom:24px">
      <div style="font-size:26px;font-weight:700;color:var(--c-text)">Panel de control</div>

    </div>

    <!-- KPIs principales -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
      <div class="kpi" style="border-left:4px solid var(--c-blue)">
        <div class="l">Clientes</div>
        <div class="v" style="color:var(--c-blue);font-size:30px">${clientes.length}</div>
      </div>
      <div class="kpi" style="border-left:4px solid var(--c-text2)">
        <div class="l">Patrimonio gestionado</div>
        <div class="v" style="font-size:22px">${fmtE(capTotal)}</div>
      </div>
    </div>

    <!-- Comisiones: 3 bloques -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px">

      <!-- Mes actual -->
      <div class="card" style="border-top:4px solid var(--c-amber)">
        <div class="card-head" style="margin-bottom:14px">
          <span class="card-title" style="color:var(--c-amber)">📅 ${fmtMes(mesActual)}</span>
          <span style="font-size:16px;font-weight:800;color:var(--c-amber)">+${fmtE(totalMes)}</span>
        </div>
        ${ordProv.filter(p=>comMesActual[p]).map(prov=>{
          const info=PROVEEDORES[prov]||{icon:"📋",color:"#6B6860"};
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-border)">
            <span style="font-size:12px;font-weight:600;color:${info.color}">${info.icon} ${prov}</span>
            <span style="font-size:13px;font-weight:700">+${fmtE(comMesActual[prov])}</span>
          </div>`;
        }).join("")}
        ${!Object.keys(comMesActual).length?`<div style="font-size:12px;color:var(--c-text3);padding:8px 0">Sin comisiones este mes</div>`:""}
        <button class="btn amber sm" onclick="verComisiones()" style="width:100%;margin-top:12px;font-size:11px">Ver detalle →</button>
      </div>

      <!-- 2026 -->
      <div class="card" style="border-top:4px solid var(--c-green)">
        <div class="card-head" style="margin-bottom:14px">
          <span class="card-title" style="color:var(--c-green)">📆 Pendiente 2026</span>
          <span style="font-size:16px;font-weight:800;color:var(--c-green)">+${fmtE(total2026)}</span>
        </div>
        ${ordProv.filter(p=>com2026[p]).map(prov=>{
          const info=PROVEEDORES[prov]||{icon:"📋",color:"#6B6860"};
          const pct=total2026>0?(com2026[prov]/total2026*100):0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
              <span style="font-size:12px;font-weight:600;color:${info.color}">${info.icon} ${prov}</span>

          return `<div style="margin-bottom:10px">

      <div class="card">
        <div class="card-head"><span class="card-title">💼 Patrimonio por proveedor</span></div>
        ${ordProv.filter(p=>porProv[p]).map(prov=>{
          const g=porProv[prov];
          const info=PROVEEDORES[prov]||{color:"#6B6860",icon:"📋"};
          const pct=capTotal>0?(g.cap/capTotal*100):0;
          return `<div style="margin-bottom:12px">

            </div>
            <div style="font-size:11px;color:var(--c-text3)">${pct.toFixed(1)}%</div>
          </div>`;
        }).join("")}
      </div>

      <!-- Próximos vencimientos -->

        <div class="card-head">

          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;${i<Math.min(proxVenc.length,7)-1?"border-bottom:1px solid var(--c-border)":""}">

function cambiarFechaConsulta(fecha){
  if(!fecha)return;
  fechaConsulta=fecha;
  const cl=getClient();if(!cl)return;
  const hR=hoyReal();
  const esFecha=fechaConsulta&&fechaConsulta!==hR;

  // Actualizar aviso
  const aviso=document.getElementById("fecha-aviso");
  if(aviso){
    aviso.style.display=esFecha?"block":"none";
    if(esFecha){
      const fD=f=>f.split("-").reverse().join("/");
      aviso.innerHTML=`⚠️ Posiciones a fecha <strong>${fD(fechaConsulta)}</strong>`;
    }
  }

  // Actualizar color input
  const inp=document.getElementById("fecha-consulta");
  if(inp)inp.style.color=esFecha?"var(--c-amber)":"var(--c-text)";

  // Botón volver a hoy
  const btnHoy=document.getElementById("btn-volver-hoy");
  if(btnHoy)btnHoy.style.display=esFecha?"inline":"none";

  // Eliminar KPIs existentes y limpiar panel
  document.querySelectorAll(".kpis").forEach(k=>k.remove());
  const panel=document.getElementById("tab-"+activeTab);
  if(panel)panel.innerHTML="";

  // Recalcular todo con la nueva fecha
  renderKpis(cl);
  if(activeTab==="posiciones")renderPosiciones(cl);
  else if(activeTab==="cobros")renderCobros(cl);
  else if(activeTab==="anual")renderAnual(cl);
  else renderEvolucion(cl);
}

function volverAHoy(){
  fechaConsulta=null;
  const inp=document.getElementById("fecha-consulta");
  if(inp)inp.value=hoyReal();
  cambiarFechaConsulta(hoyReal());
  fechaConsulta=null; // asegurar que queda null
  const cl=getClient();if(!cl)return;
  document.querySelectorAll(".kpis").forEach(k=>k.remove());
  const panel=document.getElementById("tab-"+activeTab);
  if(panel)panel.innerHTML="";
  renderKpis(cl);
  if(activeTab==="posiciones")renderPosiciones(cl);
  else if(activeTab==="cobros")renderCobros(cl);
  else if(activeTab==="anual")renderAnual(cl);
  else renderEvolucion(cl);
}

function setTab(id){
  activeTab=id;
  document.querySelectorAll(".tab").forEach(t=>{
    const labels={posiciones:"posiciones",cobros:"cobros",anual:"anual",evolucion:"evolu"};
    t.classList.toggle("on",t.textContent.toLowerCase().includes(labels[id]||id));
  });
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  document.getElementById("tab-"+id).classList.add("on");
  const cl=getClient();if(!cl)return;
  if(id==="posiciones")renderPosiciones(cl);
  else if(id==="cobros")renderCobros(cl);
  else if(id==="anual")renderAnual(cl);
  else renderEvolucion(cl);
}

function renderKpis(cl){
  const h=hoy();
  const lineas=cl.lineas||[];
  let capTot=0,rentaCobrada=0,rentaCapitalizada=0,rentaPendiente=0,plusvaliaLatente=0,rentaMesTot=0;
  let comPendiente=0, comCobrada=0;
  lineas.forEach(l=>{
    if(!l.tramos.length)return;
    // Solo sumar capital del tramo activo a fecha h
    l.tramos.forEach((t2,ti2)=>{
      if(t2.cancelado)return; // cancelados no suman
      if(t2.ini&&t2.ini.slice(0,7)>h.slice(0,7))return;
      const esIndef2=!t2.ven||t2.ven.startsWith("2099")||t2.capitaliz==="variable";
      if(!esIndef2&&t2.ven<=h)return;
      const sig2=l.tramos[ti2+1];
      if(sig2&&sig2.ini<=h)return;
      capTot+=capIni(l,ti2);
    });
    l.tramos.forEach((t,ti)=>{
      const tp=TIPOS[t.tipo]||{};
      const c=capIni(l,ti);
      const rentaTotal=rentaAcumT(l,ti);
      if(t.capitaliz==="variable"){
        const diff=(t.valorFecha||c)-c;
        if(diff>=0)rentaCapitalizada+=diff; else plusvaliaLatente+=diff;
      } else if(esRenta45(t)){
        const esCapit=(t.modalidad45||"cobrar")==="capitalizar";
        const desde=t.periodoCapitalizaDesde||null;
        if(esCapit){
          const pagos=fechasPagos45(t).filter(p=>p<=h);
          let capAcum=c,cobradoAntes=0;
          pagos.forEach((_,i)=>{
            const periodo=i+1;
            if(desde&&periodo<desde) cobradoAntes+=rentaPeriodo45(c,t.tae);
            else capAcum+=rentaPeriodo45(capAcum,t.tae);
          });
          rentaCobrada+=cobradoAntes;
          rentaCapitalizada+=(capAcum-c);
          const totalFinal=capFin45(c,t.tae,t.ini,t.ven,desde);
          rentaPendiente+=totalFinal-capAcum-cobradoAntes;
        } else {
          const rentaHoy=rentaAcumT_hoy(l,ti,h);
          rentaCobrada+=rentaHoy;
          rentaPendiente+=rentaTotal-rentaHoy;
        }
      } else if(tp.rentaMensual||esPagoMensual(t.capitaliz)){
        const hasta=t.ven<h?t.ven:h;
        const mc=mesesCobrados(t.ini,hasta,t);
        const cobrada=rentaMesT(c,t)*mc;
        rentaCobrada+=cobrada;
        rentaPendiente+=rentaTotal-cobrada;
      } else {
        if(t.ven<=h) rentaCobrada+=rentaTotal;
        else rentaPendiente+=rentaTotal;
      }
      // Comisiones para mí
      (t.comision?.pagos||[]).forEach(p=>{
        if(p.cobrado) comCobrada+=p.importe;
        else comPendiente+=p.importe;
      });
    });
    rentaMesTot+=rentaMensLinea(l,h);
  });
  const prox=lineas.flatMap(l=>l.tramos).filter(t=>t.ven>h&&t.capitaliz!=="variable").sort((a,b)=>new Date(a.ven)-new Date(b.ven))[0];
  const dp=prox?dias(h,prox.ven):null;
  const sigPL=plusvaliaLatente>=0?"+":"";
  const colPL=plusvaliaLatente>=0?"var(--c-green)":"var(--c-red)";
  document.getElementById("client-sub").textContent=`${lineas.length} línea${lineas.length!==1?"s":""} · Capital invertido: ${fmtE(capTot)}`;
  const kDiv=document.createElement("div");

function renderPosiciones(cl){
  const panel=document.getElementById("tab-posiciones");
  const h=hoy();
  const card=document.createElement("div");card.className="card";
  const lineas=cl.lineas||[];
  let html=`<div class="card-head"><span class="card-title">Líneas de inversión</span><button class="btn green sm" onclick="showModal('nueva-linea')">+ Añadir inversión</button></div>`;
  if(!lineas.length){
    html+=`<div class="empty"><div class="icon">◎</div><p>Sin posiciones todavía.<br>Pulsa "+ Añadir inversión" para empezar.</p></div>`;
  } else {
    html+='<div>';
    lineas.forEach((l,li)=>{
      const capI=l.tramos[0]?.cap||0;
      const rentaTot=l.tramos.reduce((s,t,ti)=>s+rentaAcumT(l,ti),0);
      const tp0=TIPOS[l.tramos[0]?.tipo]||TIPOS.variable;
      let chain='<div class="chain">';
      let rentaCobL=0,rentaPendL=0;
      l.tramos.forEach((t,ti)=>{
        const ci=capIni(l,ti),cf=capFinT(l,ti),est=estT(t),tp=TIPOS[t.tipo]||TIPOS.variable;
        const cls=est.txt==="Activo"?"act":est.txt==="Vencido"?"venc":est.txt==="Futuro"?"fut":"";
        const esM=tp.rentaMensual||esPagoMensual(t.capitaliz);
        const es45=esRenta45(t);
        const rentaTotal=rentaAcumT(l,ti);
        let rCob=0,rPend=0;
        const esVar=t.capitaliz==="variable";
        if(esVar){
          const diff=(t.valorFecha||ci)-ci;
          rCob=diff>0?diff:0;
          rPend=diff<0?diff:0;
        } else if(es45){
          const rentaHoy=rentaAcumT_hoy(l,ti,h);
          const rentaTotal=rentaAcumT(l,ti);
          rCob=rentaHoy;
          rPend=rentaTotal-rentaHoy;
        } else if(esM){
          const hasta=t.ven<h?t.ven:h;
          const mc=mesesCobrados(t.ini,hasta,t);
          rCob=rentaMesT(ci,t)*mc;
          rPend=rentaTotal-rCob;
        } else {
          if(t.ven<=h) rCob=rentaTotal; else rPend=rentaTotal;
        }
        rentaCobL+=rCob; rentaPendL+=rPend;
        // Subtítulo del chip para 45 días
        const esCapitalizar45=(t.modalidad45||"cobrar")==="capitalizar";
        const desde45=t.periodoCapitalizaDesde||null;
        const esMixto45=esCapitalizar45&&desde45&&desde45>1;
        const valCap45Hoy=es45&&esCapitalizar45?valCap45En(ci,t.tae,t.ini,t.ven,h,desde45):0;
        const chip45Info=es45
          ?` · ${fmtE(rentaPeriodo45(ci,t.tae))}/45d · ${esMixto45?`cobra ${desde45-1} · capitaliza resto`:esCapitalizar45?"capitaliza":"cobra"}`
          :"";
        const chip45Valor=es45&&esCapitalizar45
          ?`<div class="chip-d" style="color:var(--c-green);font-weight:600">Valor hoy: ${fmtE(valCap45Hoy)}</div>`
          :"";
        const rentaLine=esVar
          ?(()=>{
            const diff=(t.valorFecha||ci)-ci;
            const pct=ci>0?(diff/ci*100):0;
            const col=diff>=0?"var(--c-green)":"var(--c-red)";
            const sig=diff>=0?"+":"";
            return `<span style="color:${col};font-size:10px">${sig}${fmtE(diff)} (${sig}${pct.toFixed(2)}%)</span>
                    <span style="color:var(--c-text3);font-size:10px"> · val. ${t.fechaVal||t.ven}</span>`;
          })()
          :rCob>0&&rPend>0
          ?`<span style="color:var(--c-green);font-size:10px">+${fmtE(rCob)} cobrado</span><span style="color:var(--c-text3);font-size:10px"> · +${fmtE(rPend)} pdte.</span>`
          :rCob>0
          ?`<span style="color:var(--c-green);font-size:10px">+${fmtE(rCob)} cobrado</span>`
          :rPend>0
          ?`<span style="color:var(--c-text3);font-size:10px">+${fmtE(rPend)} pendiente</span>`
          :"";
        if(ti>0)chain+=`<span class="arr">→</span>`;
        const esVencido=est.txt==="Vencido";
        const esCancelado=t.cancelado===true;
        const esVencidoOCancelado=esVencido||esCancelado;
        chain+=`<div class="chip ${cls}" onclick="editTramo(${l.id},${t.id})" style="${esVencidoOCancelado?"opacity:0.55;filter:grayscale(0.4);":""}">
          <div class="chip-prod" title="${t.prod}" style="${esVencidoOCancelado?"text-decoration:line-through;color:var(--c-text3)":""}">${t.prod}</div>
          ${esVar
            ?`<div class="chip-tae var">${fmtE(t.valorFecha||ci)}</div>`
            :`<div class="chip-tae ${tp.garantizado===false?'var':''}">${t.tae.toFixed(2)}%${tp.rentaMensual?"/mes":es45?" /45d":""}</div>`
          }
          <div class="chip-d">${t.ini.slice(0,7)}${esVar?" · val: "+t.fechaVal:" → "+t.ven.slice(0,7)}</div>
          <div class="chip-d">${fmtE(ci)}${esM?" · "+fmtE(rentaMesT(ci,t))+"/mes":""}${chip45Info}</div>
          ${chip45Valor}
          <div style="margin-top:3px">${rentaLine}</div>
          <span class="badge ${est.cls}" style="margin-top:3px;display:inline-block">${esCancelado?"CANCELADO":est.txt}</span>
          <div onclick="event.stopPropagation()" style="margin-top:6px;border-top:1px solid rgba(0,0,0,.07);padding-top:5px;display:flex;align-items:center;justify-content:space-between">
            ${t.comision?.pagos?.length
              ?`<span style="font-size:10px;color:var(--c-green);font-weight:600">💶 ${typeof t.comision.pct==="object"?(t.comision.pct.pctInicial||"")+"% inicio":t.comision.pct+"%" } comisión</span>`
              :`<span style="font-size:10px;color:var(--c-text3)">💶 Sin comisión</span>`
            }
            <button onclick="showModalComision(${l.id},${t.id})" style="font-size:10px;padding:2px 6px;border:0.5px solid var(--c-border2);border-radius:4px;background:rgba(255,255,255,.7);cursor:pointer;color:var(--c-text2)">${t.comision?.pagos?.length?"Editar":"+ Añadir"}</button>
          </div>
        </div>`;
      });
      chain+='</div>';
      // Detectar si la línea tiene algún tramo vencido
      const tieneVencidos=l.tramos.some(t=>estT(t).txt==="Vencido");
      const todosVencidos=l.tramos.every(t=>estT(t).txt==="Vencido");
      html+=`<div class="linea-row" style="${todosVencidos?"opacity:0.7;":""}">
        <div class="linea-head" style="${todosVencidos?"background:var(--c-bg);border-left:3px solid var(--c-red)":""}">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="dot" style="background:${l.color}"></span>
            <span class="linea-name">${l.nombre}</span>
            <span class="tipo-tag ${tp0.tag}">${tp0.label}</span>
            ${todosVencidos?`<span style="font-size:10px;background:var(--c-red-light);color:var(--c-red);padding:2px 7px;border-radius:8px;font-weight:600">VENCIDO</span>`:""}
            ${tieneVencidos&&!todosVencidos?`<span style="font-size:10px;color:var(--c-text3)">(con tramos vencidos)</span>`:""}
            ${rentaCobL>0?`<span class="linea-renta">+${fmtE(rentaCobL)} cobrado</span>`:""}
            ${rentaPendL>0?`<span style="font-size:12px;color:var(--c-text3)">+${fmtE(rentaPendL)} pendiente</span>`:""}
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn amber sm" onclick="showModal('renovar',${l.id})">+ Renovar</button>
            <button class="btn sm" style="background:#FFF0F0;color:var(--c-red);border-color:var(--c-red-light)" onclick="showCancelacionAnticipada(${l.id})">✕ Cancelar</button>
            <button class="btn danger sm" onclick="borrarLinea(${l.id})">🗑</button>
          </div>
        </div>
        ${chain}
      </div>`;
    });
    html+='</div>';
  }
  card.innerHTML=html;
  panel.appendChild(card);
}

function renderCobros(cl){
  const panel=document.getElementById("tab-cobros");
  const lineas=cl.lineas||[];
  const h=hoy();

  // Generar lista completa de cobros: pasados (realizados) y futuros (previstos)
  const cobros=[];
  lineas.forEach(l=>{
    l.tramos.forEach((t,ti)=>{
      const ci=capIni(l,ti);
      const tp=TIPOS[t.tipo]||{};
      const esM=tp.rentaMensual||esPagoMensual(t.capitaliz);
      const es45=esRenta45(t);
      if(es45){
        const pagos45=fechasPagos45(t);
        const totalPagos=pagos45.length;
        if((t.modalidad45||"cobrar")==="cobrar"){
          pagos45.forEach((fecha,idx)=>{
            cobros.push({fecha,linea:l.nombre,prod:t.prod,
              concepto:`Renta 45 días (cobro ${idx+1}/${totalPagos})`,
              importe:rentaPeriodo45(ci,t.tae),tipo:"renta",realizado:fecha<=h,color:l.color});
          });
          cobros.push({fecha:t.ven,linea:l.nombre,prod:t.prod,concepto:"Devolución de capital",importe:ci,tipo:"capital",realizado:t.ven<=h,color:l.color});
        } else {
          const totalFinal=capFin45(ci,t.tae,t.ini,t.ven);
          cobros.push({fecha:t.ven,linea:l.nombre,prod:t.prod,
            concepto:"Vencimiento — capital + intereses capitalizados (45d)",
            importe:totalFinal,tipo:"vencimiento",realizado:t.ven<=h,color:l.color});
        }
      } else if(esM){
        // Usar fechasPagos para obtener fechas reales con día de cobro y primer cobro configurados
        const pagos=fechasPagos(t);
        pagos.forEach((fecha,idx)=>{
          cobros.push({
            fecha,
            linea:l.nombre,
            prod:t.prod,
            concepto:`Renta mensual (cobro ${idx+1}/${pagos.length}) — día ${t.diaCobro||8}`,
            importe:rentaMesT(ci,t),
            tipo:"renta",
            realizado:fecha<=h,
            color:l.color
          });
        });
        // Al vencimiento devuelve el capital
        cobros.push({
          fecha:t.ven,
          linea:l.nombre,
          prod:t.prod,
          concepto:"Devolución de capital",
          importe:ci,
          tipo:"capital",
          realizado:t.ven<=h,
          color:l.color
        });
      } else {
        // Pago único al vencimiento: capital + rentabilidad
        const rentaT=rentaAcumT(l,ti);
        cobros.push({
          fecha:t.ven,
          linea:l.nombre,
          prod:t.prod,
          concepto:"Vencimiento — capital + rentabilidad",
          importe:ci+rentaT,
          tipo:"vencimiento",
          realizado:t.ven<=h,
          color:l.color
        });
      }
    });
  });

  cobros.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

  const realizados=cobros.filter(c=>c.realizado);
  const previstos=cobros.filter(c=>!c.realizado);
  const totalCobrado=realizados.reduce((s,c)=>s+(c.tipo==="capital"?0:c.importe),0);
  const totalPrevisto=previstos.reduce((s,c)=>s+(c.tipo==="capital"?0:c.importe),0);
  const rentasCobradas=realizados.filter(c=>c.tipo==="renta").reduce((s,c)=>s+c.importe,0);
  const rentasPrevistas=previstos.filter(c=>c.tipo==="renta"||c.tipo==="vencimiento").reduce((s,c)=>s+(c.tipo==="renta"?c.importe:c.importe-cobros.find(x=>x===c&&x.tipo==="capital"?0:0)||c.importe-lineas.flatMap(l=>l.tramos).find(t=>t.ven===c.fecha)?0:0),0);

  // KPI resumen cobros
  const card0=document.createElement("div");card0.className="card";
  const totalRentasPrev=previstos.filter(c=>c.tipo==="renta").reduce((s,c)=>s+c.importe,0);
  const totalVtoPrev=previstos.filter(c=>c.tipo==="vencimiento").reduce((s,c)=>s+c.importe,0);
  card0.innerHTML=`
    <div class="card-head"><span class="card-title">Resumen de cobros</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px">
      <div class="kpi"><div class="l">Rentas cobradas hasta hoy</div><div class="v g">+${fmtE(rentasCobradas)}</div></div>
      <div class="kpi"><div class="l">Rentas mensuales previstas</div><div class="v" style="color:var(--c-text2)">+${fmtE(totalRentasPrev)}</div></div>
      <div class="kpi"><div class="l">Vencimientos previstos</div><div class="v" style="color:var(--c-text2)">+${fmtE(totalVtoPrev)}</div></div>
      <div class="kpi"><div class="l">Próximo cobro</div><div class="v a" style="font-size:13px">${previstos[0]?previstos[0].fecha+" · "+fmtE(previstos[0].importe):"—"}</div></div>
    </div>`;
  panel.appendChild(card0);

  // Función para renderizar una tabla de cobros
  function tablaCobros(lista,titulo,esRealizado){
    if(!lista.length)return`<p style="font-size:13px;color:var(--c-text3);padding:.5rem 0">Sin cobros en este periodo.</p>`;
    // Agrupar por año/mes para mejor lectura
    const grupos={};
    lista.forEach(c=>{
      const ym=c.fecha.slice(0,7);
      if(!grupos[ym])grupos[ym]=[];
      grupos[ym].push(c);
    });
    let html=`<div class="tbl-wrap"><table>
      <thead><tr>
        <th style="width:10%">Fecha</th>
        <th style="width:18%">Línea</th>
        <th style="width:18%">Producto</th>
        <th style="width:28%">Concepto</th>
        <th style="width:13%;text-align:right">Importe</th>
        <th style="width:13%;text-align:right">Acumulado</th>
      </tr></thead><tbody>`;
    let acum=0;
    // Si es realizado empezamos el acumulado desde 0, si previsto desde el total ya cobrado
    Object.keys(grupos).sort().forEach(ym=>{
      const mes=grupos[ym];
      const [anio,m]=ym.split("-");
      const nombreMes=new Date(ym+"-01").toLocaleDateString('es-ES',{month:'long',year:'numeric'});
      html+=`<tr><td colspan="6" style="background:var(--c-bg);font-size:11px;font-weight:600;color:var(--c-text2);padding:6px 8px;text-transform:uppercase;letter-spacing:.04em">${nombreMes}</td></tr>`;
      mes.forEach(c=>{
        if(c.tipo!=="capital") acum+=c.importe;
        const color=esRealizado?"var(--c-green)":"var(--c-text3)";
        const iconos={renta:"↩",vencimiento:"★",capital:"◎"};
        html+=`<tr>
          <td style="font-family:'DM Mono',monospace;font-size:11px">${c.fecha}</td>
          <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c.color};margin-right:5px;vertical-align:middle"></span>${c.linea}</td>
          <td style="font-size:11px;color:var(--c-text2)">${c.prod}</td>
          <td style="font-size:12px">${iconos[c.tipo]||""} ${c.concepto}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:600;color:${color}">${c.tipo==="capital"?"":"+"}${fmtE(c.importe)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--c-text2)">${c.tipo==="capital"?"—":fmtE(acum)}</td>
        </tr>`;
      });
    });
    html+=`</tbody></table></div>`;
    return html;
  }

  // COBROS REALIZADOS
  const card1=document.createElement("div");card1.className="card";
  card1.innerHTML=`<div class="card-head"><span class="card-title">Cobros realizados</span><span style="font-size:12px;color:var(--c-green);font-weight:500">${realizados.filter(c=>c.tipo!=="capital").length} cobros · +${fmtE(rentasCobradas)}</span></div>`+tablaCobros(realizados,"Realizados",true);
  panel.appendChild(card1);

  // COBROS PREVISTOS
  const card2=document.createElement("div");card2.className="card";
  card2.innerHTML=`<div class="card-head"><span class="card-title">Cobros previstos</span><span style="font-size:12px;color:var(--c-text3);font-weight:500">${previstos.filter(c=>c.tipo!=="capital").length} cobros previstos</span></div>`+tablaCobros(previstos,"Previstos",false);
  panel.appendChild(card2);
}

function renderAnual(cl){
  const panel=document.getElementById("tab-anual");
  const lineas=cl.lineas||[];
  if(!lineas.length){panel.innerHTML+='<div class="card"><p style="color:var(--c-text3);font-size:13px">Sin datos.</p></div>';return;}
  const allF=lineas.flatMap(l=>l.tramos.flatMap(t=>[t.ini,t.ven]));
  const minY=new Date(Math.min(...allF.map(f=>new Date(f)))).getFullYear();
  const maxY=new Date(Math.max(...allF.map(f=>new Date(f)))).getFullYear();
  const years=[];for(let y=minY;y<=maxY;y++)years.push(y);
  const maxVal=Math.max(...years.map(y=>{
    const fI=y+"-01-01",fF=y+"-12-31";
    let capAnio=0,rentaAnio=0;
    lineas.forEach(l=>{
      l.tramos.filter(t=>t.ini<=fF&&t.ven>=fI).forEach(t=>{
        const ti=l.tramos.indexOf(t),c=capIni(l,ti),tp=TIPOS[t.tipo]||{};
        capAnio+=c;
        if(tp.rentaMensual||esPagoMensual(t.capitaliz)){
          const desde=t.ini>fI?t.ini:fI,hasta=t.ven<fF?t.ven:fF;
          rentaAnio+=rentaMesT(c,t)*Math.max(0,anios(desde,hasta)*12);
        } else {
          const hasta=t.ven<fF?t.ven:fF;
          const rH=calcRenta(c,t.tae,t.ini,hasta,t.capitaliz,t.rentaTipo,t.ini,t.ven);
          const rI=t.ini>=fI?0:calcRenta(c,t.tae,t.ini,fI,t.capitaliz,t.rentaTipo,t.ini,t.ven);
          rentaAnio+=Math.max(0,rH-rI);
        }
      });
    });
    return capAnio+rentaAnio;
  }),1);

  // BAR CHART
  const card1=document.createElement("div");card1.className="card";
  let bHtml=`<div class="card-head"><span class="card-title">Crecimiento año a año</span></div>`;
  years.forEach(y=>{
    const fI=y+"-01-01",fF=y+"-12-31";
    let capAnio=0,rentaAnio=0;
    lineas.forEach(l=>{
      l.tramos.filter(t=>t.ini<=fF&&t.ven>=fI).forEach(t=>{
        const ti=l.tramos.indexOf(t),c=capIni(l,ti),tp=TIPOS[t.tipo]||{};
        capAnio+=c;
        if(tp.rentaMensual||esPagoMensual(t.capitaliz)){
          const desde=t.ini>fI?t.ini:fI,hasta=t.ven<fF?t.ven:fF;
          rentaAnio+=rentaMesT(c,t)*Math.max(0,anios(desde,hasta)*12);
        } else {
          const hasta=t.ven<fF?t.ven:fF;
          const rH=calcRenta(c,t.tae,t.ini,hasta,t.capitaliz,t.rentaTipo,t.ini,t.ven);
          const rI=t.ini>=fI?0:calcRenta(c,t.tae,t.ini,fI,t.capitaliz,t.rentaTipo,t.ini,t.ven);
          rentaAnio+=Math.max(0,rH-rI);
        }
      });
    });
    if(capAnio===0)return;
    const tot=capAnio+rentaAnio;
    const pctCap=Math.min(100,Math.round(capAnio/maxVal*100));
    const pctTot=Math.min(100,Math.round(tot/maxVal*100));
    const isNow=y===new Date().getFullYear();
    bHtml+=`<div class="year-row">
      <span class="year-lbl">${y}${isNow?"*":""}</span>
      <div class="bar-wrap">
        <div class="bar-cap" style="width:${pctCap}%"></div>
        <div class="bar-ren" style="width:${pctTot}%"></div>
        <span class="bar-val">${fmtE(tot)}</span>
      </div>
    </div>`;
  });
  bHtml+=`<p style="font-size:11px;color:var(--c-text3);margin-top:10px">* Año en curso · Azul = capital activo · Verde = rentabilidad generada ese año</p>`;
  card1.innerHTML=bHtml;panel.appendChild(card1);

  // TABLE
  const card2=document.createElement("div");card2.className="card";
  let tHtml=`<div class="card-head"><span class="card-title">Detalle por línea y año</span></div><div class="tbl-wrap"><table>
    <thead><tr>
      <th style="width:8%">Año</th><th style="width:20%">Línea</th><th style="width:15%">Capital base</th>
      <th style="width:14%">Rentab. año</th><th style="width:14%">Rentas cobradas</th>
      <th style="width:15%">Valor acum.</th><th style="width:14%">Vencimientos</th>
    </tr></thead><tbody>`;
  years.forEach(y=>{
    const fI=y+"-01-01",fF=y+"-12-31";
    lineas.forEach(l=>{
      const tramosActivos=l.tramos.filter(t=>t.ini<=fF&&t.ven>=fI);
      if(!tramosActivos.length)return;
      const capActivo=tramosActivos.reduce((s,t)=>s+capIni(l,l.tramos.indexOf(t)),0);
      let rAnio=0;
      tramosActivos.forEach(t=>{
        const ti=l.tramos.indexOf(t);
        const c=capIni(l,ti);
        const tp=TIPOS[t.tipo]||{};
        if(tp.rentaMensual||esPagoMensual(t.capitaliz)){
          // Solo meses completos dentro de este año
          const desde=t.ini>fI?t.ini:fI;
          const hasta=t.ven<fF?t.ven:fF;
          const mesesAnio=mesesCobrados(desde,hasta,t);
          rAnio+=rentaMesT(c,t)*mesesAnio;
        } else {
          // Solo se cobra cuando vence — si el vencimiento cae en este año
          if(t.ven>=fI&&t.ven<=fF){
            rAnio+=rentaAcumT(l,ti);
          }
          // Si no vence este año, rentabilidad = 0 (pendiente de cobro)
        }
      });
      const vF=capActivo+rAnio;
      const rMes=tramosActivos
        .filter(t=>TIPOS[t.tipo]?.rentaMensual||esPagoMensual(t.capitaliz))
        .reduce((s,t)=>{
          const ti=l.tramos.indexOf(t);
          const desde=t.ini>fI?t.ini:fI;
          const hasta=t.ven<fF?t.ven:fF;
          const meses=Math.max(0,anios(desde,hasta)*12);
          return s+rentaMesT(capIni(l,ti),t)*meses;
        },0);
      const vtos=l.tramos.filter(t=>t.ven>=fI&&t.ven<=fF).map(t=>t.prod).join(", ");
      tHtml+=`<tr>
        <td style="font-family:'DM Mono',monospace">${y}</td>
        <td><span class="dot" style="background:${l.color};margin-right:5px"></span>${l.nombre}</td>
        <td>${fmtE(l.tramos[0]?.cap||0)}</td>
        <td style="color:var(--c-green)">+${fmtE(rAnio)}</td>
        <td style="color:var(--c-blue)">${rMes>0?fmtE(rMes):"—"}</td>
        <td style="font-weight:600">${fmtE(vF)}</td>
        <td style="font-size:11px;color:var(--c-text3)">${vtos||"—"}</td>
      </tr>`;
    });
  });
  tHtml+=`</tbody></table></div>`;
  card2.innerHTML=tHtml;panel.appendChild(card2);
}

function renderEvolucion(cl){
  const panel=document.getElementById("tab-evolucion");
  const lineas=cl.lineas||[];
  if(!lineas.length){panel.innerHTML+='<div class="card"><p style="color:var(--c-text3);font-size:13px">Sin datos.</p></div>';return;}

  // CHART
  const card1=document.createElement("div");card1.className="card";
  const legDiv=document.createElement("div");legDiv.className="legend";
  const cwDiv=document.createElement("div");cwDiv.className="chart-wrap";
  const canvas=document.createElement("canvas");canvas.id="chart-evo";
  cwDiv.appendChild(canvas);
  card1.appendChild(Object.assign(document.createElement("div"),{className:"card-head",innerHTML:'<span class="card-title">Evolución del patrimonio</span>'}));
  card1.appendChild(legDiv);card1.appendChild(cwDiv);
  panel.appendChild(card1);

  const allF=lineas.flatMap(l=>l.tramos.flatMap(t=>[t.ini,t.ven]));
  const minD=new Date(Math.min(...allF.map(f=>new Date(f))));
  const maxD=new Date(Math.max(...allF.map(f=>new Date(f))));
  const pts=[];let c=new Date(minD);
  while(c<=maxD){pts.push(new Date(c));c.setMonth(c.getMonth()+1);}
  pts.push(maxD);
  const labels=pts.map(d=>d.toISOString().split("T")[0].slice(0,7));
  const dsets=[];

  // Función que calcula el valor cobrado de una línea en una fecha (capital + rentas ya cobradas)
  function valCobradoEn(l,f){
    let total=0;
    for(let i=0;i<l.tramos.length;i++){
      const t=l.tramos[i],tp=TIPOS[t.tipo]||{};
      if(f<t.ini)continue;
      const c=capIni(l,i);
      const esM=tp.rentaMensual||esPagoMensual(t.capitaliz);
      if(esM){
        // Capital siempre presente, rentas: meses completos cobrados
        const hasta=t.ven<f?t.ven:f;
        const mc=mesesCobrados(t.ini,hasta,t);
        total+=c+rentaMesT(c,t)*mc;
      } else {
        // Capital + rentabilidad solo si ya venció
        total+=f>=t.ven?capFinT(l,i):c;
      }
    }
    return total;
  }

  // Función que calcula el total esperado (cobrado + pendiente) de una línea en fecha
  function valTotalEsperadoEn(l,f){
    let total=0;
    for(let i=0;i<l.tramos.length;i++){
      const t=l.tramos[i];
      if(f<t.ini)continue;
      total+=capFinT(l,i); // capital final del tramo siempre como expectativa
    }
    return total;
  }

  lineas.forEach(l=>{
    dsets.push({
      label:l.nombre+" (cobrado)",
      data:pts.map(p=>Math.round(valCobradoEn(l,p.toISOString().split("T")[0]))),
      borderColor:l.color,backgroundColor:l.color+"18",
      fill:false,tension:.4,pointRadius:1,borderWidth:2,borderDash:[]
    });
  });

  // Total cobrado
  const totCob=pts.map((_,i)=>dsets.reduce((s,ds)=>s+(ds.data[i]||0),0));
  dsets.push({
    label:"Total cobrado",
    data:totCob,
    borderColor:"#1A1917",backgroundColor:"transparent",
    fill:false,tension:.4,pointRadius:1,borderWidth:2.5,borderDash:[]
  });

  // Total esperado (cobrado + pendiente) — línea punteada gris
  const totEsp=pts.map(p=>{
    const f=p.toISOString().split("T")[0];
    return Math.round(lineas.reduce((s,l)=>s+valTotalEsperadoEn(l,f),0));
  });
  dsets.push({
    label:"Total esperado (incl. pendiente)",
    data:totEsp,
    borderColor:"#9E9C96",backgroundColor:"transparent",
    fill:false,tension:.4,pointRadius:0,borderWidth:1.5,borderDash:[5,4]
  });
  if(chartInst){chartInst.destroy();chartInst=null;}
  chartInst=new Chart(canvas,{type:"line",data:{labels,datasets:dsets},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:"index",intersect:false},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+c.dataset.label+": "+fmt(c.raw)+" €"}}},
    scales:{
      x:{grid:{color:"rgba(0,0,0,.05)"},ticks:{maxRotation:45,autoSkip:true,maxTicksLimit:14,font:{size:10,family:"'DM Mono',monospace"}}},
      y:{grid:{color:"rgba(0,0,0,.05)"},ticks:{callback:v=>fmt(v/1000)+"k €",font:{size:10,family:"'DM Mono',monospace"}}}
    }
  }});
  legDiv.innerHTML=[
    ...lineas.map(l=>`<span class="leg"><span class="leg-sq" style="background:${l.color}"></span>${l.nombre}</span>`),
    `<span class="leg"><span class="leg-sq" style="background:#1A1917"></span>Total cobrado</span>`,
    `<span class="leg"><span style="display:inline-block;width:18px;height:2px;background:#9E9C96;border-top:2px dashed #9E9C96;margin-right:4px;vertical-align:middle"></span>Total esperado</span>`
  ].join("");

  // TABLE
  const card2=document.createElement("div");card2.className="card";
  const h=hoy();
  let tHtml=`<div class="card-head"><span class="card-title">Detalle de todos los tramos</span></div><div class="tbl-wrap"><table>
    <thead><tr>
      <th style="width:13%">Línea</th><th style="width:13%">Producto</th><th style="width:8%">Tipo</th>
      <th style="width:9%">Capital</th><th style="width:7%">TAE</th>
      <th style="width:7%">Inicio</th><th style="width:7%">Vence</th><th style="width:6%">Días</th>
      <th style="width:10%">Rentab. cobrada</th><th style="width:10%">Rentab. pendiente</th><th style="width:10%">Capital final</th><th style="width:6%">Estado</th>
    </tr></thead><tbody>`;
  lineas.forEach((l,li)=>{
    l.tramos.forEach((t,ti)=>{
      const ci=capIni(l,ti),cf=capFinT(l,ti),est=estT(t),tp=TIPOS[t.tipo]||TIPOS.variable;
      const dr=t.ven>h?dias(h,t.ven):null;
      const esR=tp.rentaMensual||esPagoMensual(t.capitaliz);
      const rentaTotal=rentaAcumT(l,ti);
      let rentaCob=0,rentaPend=0;
      if(esR){
        const hasta=t.ven<h?t.ven:h;
        const mesesCompletos=mesesCobrados(t.ini,hasta,t);
        rentaCob=rentaMesT(ci,t)*mesesCompletos;
        rentaPend=rentaTotal-rentaCob;
      } else {
        if(t.ven<=h){rentaCob=rentaTotal;}
        else{rentaPend=rentaTotal;}
      }
      tHtml+=`<tr>
        <td><span class="dot" style="background:${l.color};margin-right:4px"></span>${l.nombre}</td>
        <td title="${t.prod}">${t.prod}</td>
        <td><span class="tipo-tag ${tp.tag}">${tp.label}</span></td>
        <td>${fmtE(ci)}</td>
        <td style="font-family:'DM Mono',monospace">${t.tae.toFixed(2)}%${esR?"/m":""}</td>
        <td style="font-family:'DM Mono',monospace">${t.ini}</td>
        <td style="font-family:'DM Mono',monospace">${t.ven}</td>
        <td style="font-family:'DM Mono',monospace">${dr!==null?dr+"d":"—"}</td>
        <td style="color:var(--c-green)">${rentaCob>0?"+"+fmtE(rentaCob):"—"}</td>
        <td style="color:var(--c-text3)">${rentaPend>0?"+"+fmtE(rentaPend):"—"}</td>
        <td style="font-weight:600">${fmtE(cf)}</td>
        <td><span class="badge ${est.cls}">${est.txt}</span></td>
      </tr>`;
    });
  });
  tHtml+=`</tbody></table></div>
  <p style="font-size:11px;color:var(--c-text3);margin-top:8px;padding:0 4px">Rentabilidad cobrada = ya ingresada. Rentabilidad pendiente = esperada al vencimiento, no contabilizada como ingresada.</p>`;
  card2.innerHTML=tHtml;panel.appendChild(card2);
}

function onTipoChange(){
  const el=document.getElementById("m_tipo");if(!el)return;
  const t=el.value,tp=TIPOS[t]||{};
  const esVar=tp.garantizado===false;
  const es45=tp.renta45===true;
  const esMakeMark=tp.proveedor==="Make a Mark"&&es45;

  // Campo empresa (solo Make a Mark)
  const rowEmpresa=document.getElementById("m_empresa_row");
  if(rowEmpresa)rowEmpresa.style.display=esMakeMark?"block":"none";

  // Mostrar/ocultar bloques principal
  const gFields=document.getElementById("m_garantizado_fields");
  const vFields=document.getElementById("m_variable_fields");
  if(gFields)gFields.style.display=esVar?"none":"block";
  if(vFields)vFields.style.display=esVar?"block":"none";

  if(!esVar){
    const row45=document.getElementById("m_modalidad45_row");
    if(row45)row45.style.display=es45?"block":"none";
    const rowRentaTipo=document.getElementById("m_rentatipo_row");
    const rowCapitaliz=document.getElementById("m_capitaliz_row");
    const rowCobro=document.getElementById("m_cobro_row");
    if(rowRentaTipo)rowRentaTipo.style.display=es45?"none":"block";
    if(rowCapitaliz)rowCapitaliz.style.display=es45?"none":"block";
    if(rowCobro)rowCobro.style.display="none";
    const lbl=document.getElementById("m_tae_lbl");
    if(lbl)lbl.textContent=tp.rentaMensual?"Rentabilidad mensual (%)":es45?"Tipo de interés por periodo de 45 días (%)":"Rentabilidad (%)";
    if(tp.taeDefault){const te=document.getElementById("m_tae");if(te&&!te.value)te.value=tp.taeDefault;}
    // Día de cobro por defecto según tipo
    const diaCobroEl=document.getElementById("m_diaCobro");
    if(diaCobroEl&&tp.diaCobro)diaCobroEl.value=tp.diaCobro;
    const rtEl=document.getElementById("m_rentaTipo");
    if(rtEl)rtEl.value=t==="deposito_bonificado"?"plazo":"anual";
    const ce=document.getElementById("m_capitaliz");
    if(ce){
      if(tp.rentaMensual)ce.value="pago_mensual";
      else if(t==="preipo_shieldai"||t==="preipo_stripe"||t==="preipo_spacex"||t==="deposito_bonificado"||es45)ce.value="simple";
      else if(tp.esPescados){ce.value="simple";} // Pescados: simple por defecto, usuario puede cambiar
    }
    if(rowCobro&&!es45){
      const esM=tp.rentaMensual||(ce&&ce.value==="pago_mensual");
      rowCobro.style.display=esM?"block":"none";
    }
    if(tp.plazoMeses){
      const ve=document.getElementById("m_ven"),ie=document.getElementById("m_ini");
      if(ve&&ie&&!ve.value){
        const d=new Date(ie.value||hoy());d.setMonth(d.getMonth()+tp.plazoMeses);
        ve.value=d.toISOString().split("T")[0];
      }
    }
  }
  // Renderizar bloque de comisión
  const inner=document.getElementById("m_com_inner");
  if(inner)inner.innerHTML=bloqueComisionNueva(t);
}

function calcRentVar(){
  const cap=parseFloat(document.getElementById("m_cap")?.value)||0;
  const val=parseFloat(document.getElementById("m_valorFecha")?.value)||0;
  const res=document.getElementById("m_var_result");
  if(!res)return;
  if(!cap||!val){res.style.display="none";return;}
  const diff=val-cap;
  const pct=cap>0?(diff/cap*100):0;
  const color=diff>=0?"var(--c-green)":"var(--c-red)";
  const signo=diff>=0?"+":"";
  res.style.display="block";
  res.innerHTML=`<span style="color:var(--c-text2)">Rentabilidad: </span><span style="font-weight:600;color:${color}">${signo}${fmt(diff)} € (${signo}${pct.toFixed(2)}%)</span>`;
}

function onModalidad45Change(){
  const val=document.getElementById("m_modalidad45")?.value;
  const row=document.getElementById("m_desde_row");
  if(row)row.style.display=val==="mixto"?"block":"none";
}

function onCapitalizChange(){
  const ce=document.getElementById("m_capitaliz");if(!ce)return;
  const rowCobro=document.getElementById("m_cobro_row");
  if(rowCobro)rowCobro.style.display=(ce.value==="pago_mensual")?"block":"none";

function _datosInforme(){
  // Función auxiliar que calcula los datos del informe (compartida por WA y email)
  const cl=getClient();if(!cl)return null;
  const h=hoy();
  const lineas=cl.lineas||[];
  let capTot=0,rentaCobrada=0,plusvaliaLatente=0,rentaMesTot=0;
  lineas.forEach(l=>{
    if(!l.tramos.length)return;
    capTot+=l.tramos[0].cap||0;
    l.tramos.forEach((t,ti)=>{
      const tp=TIPOS[t.tipo]||{};
      const c=capIni(l,ti);
      if(t.capitaliz==="variable"){plusvaliaLatente+=(t.valorFecha||c)-c;}
      else if(esRenta45(t)){rentaCobrada+=rentaAcumT_hoy(l,ti,h);}
      else if(tp.rentaMensual||esPagoMensual(t.capitaliz)){
        const mc=mesesCobrados(t.ini,t.ven<h?t.ven:h,t);
        rentaCobrada+=rentaMesT(c,t)*mc;
      } else {if(t.ven<=h)rentaCobrada+=rentaAcumT(l,ti);}
    });
    rentaMesTot+=rentaMensLinea(l,h);
  });
  return {cl,h,lineas,capTot,rentaCobrada,plusvaliaLatente,rentaMesTot};
}

function copiarWA(){
  const div=document.getElementById("ic_wacopy");
  const texto=div?.dataset?.texto||document.querySelector("#ic_wacopy textarea")?.value||"";
  if(!texto)return;
  navigator.clipboard.writeText(texto).then(()=>{
    const btn=document.getElementById("btnCopiar");
    if(btn){btn.textContent="✓ Copiado";setTimeout(()=>btn.textContent="Copiar texto",2000);}
  }).catch(()=>{
    const ta=document.querySelector("#ic_wacopy textarea");
    if(ta){ta.select();document.execCommand("copy");}
  });
}

      const tp=TIPOS[t.tipo]||{};

  navigator.clipboard.writeText(ta.value).then(()=>{
    if(btn){btn.textContent="✓ Copiado";setTimeout(()=>btn.textContent="📋 Copiar enlace largo",2000);}
  }).catch(()=>{ta.select();document.execCommand("copy");});
}

    const tramo={id:++nTid,tipo,prod,cap,tae,ini,ven:ven||"",capitaliz,rentaTipo,diaCobro,primerCobro,modalidad45};

    if(!com){

        const pct=7.0;

        com={pct,pagos};
      } else if(tipo==="deposito_oro"){

        const pctVal={pctInicial:4.8,pctAnual:2.0};
        const pagos=calcPagosComision(tramo,0,linea,pctVal,false);
        com={pct:pctVal,pagos};
      } else if(tipo==="deposito_bonificado"){

        const pctVal={pctInicial:4.8,pctAnual:2.0};
        const pagos=calcPagosComision(tramo,0,linea,pctVal,false);

      }

  }
