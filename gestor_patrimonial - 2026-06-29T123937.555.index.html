}

function leerComisionFormulario(tramo,ti,linea,esRenov){
  const activa=document.getElementById("m_com_activa");
  const pctEl=document.getElementById("m_com_pct");
  const tipoEl=document.getElementById("m_com_tipo");
  const tipo=tipoEl?.value||"ninguna";
  if(tipo==="ninguna"||tipo==="")return null;
  if(activa&&!activa.checked)return null;

  if(tipo==="gold_opportunity"){
    const pctIni=parseFloat(document.getElementById("m_com_pct_ini")?.value)||0;
    const pctAno1=parseFloat(document.getElementById("m_com_pct_ano1")?.value)||0;
    const pctAno2=parseFloat(document.getElementById("m_com_pct_ano2")?.value)||0;
    if(!pctIni&&!pctAno1&&!pctAno2)return null;
    const pct={pctInicial:pctIni,pctAno1,pctAno2};
    const pagos=calcPagosComision(tramo,ti,linea,pct,false);
    return {pct,pagos};
  }
  if(tipo==="deposito_bonificado"){
    const pctIni=parseFloat(document.getElementById("m_com_pct_ini")?.value)||0;
    const pctAnu=parseFloat(document.getElementById("m_com_pct_anu")?.value)||0;
    if(!pctIni&&!pctAnu)return null;
    const pagos=calcPagosComision(tramo,ti,linea,{pctInicial:pctIni,pctAnual:pctAnu},false);
    return {pct:{pctInicial:pctIni,pctAnual:pctAnu},pagos};
  }
  if(tipo==="publicidad"){
    const pct=tramo.tae>=3?5:6;
    const pagos=calcPagosComision(tramo,ti,linea,pct,false);
    return {pct,pagos};
  }
  if(tipo==="pescados"){
    const pctIni=parseFloat(document.getElementById("m_com_pct_ini")?.value)||6;
    const pct6m=parseFloat(document.getElementById("m_com_pct_6m")?.value)||6;
    const pctVal={pctInicial:pctIni,pct6meses:pct6m};
    const pagos=calcPagosComision(tramo,ti,linea,pctIni,false);
    return {pct:pctVal,pagos};
  }
  const pct=parseFloat(pctEl?.value)||0;
  if(!pct)return null;
  const pagos=calcPagosComision(tramo,ti,linea,pct,esRenov||false);
  return {pct,pagos};
}

function guardarRenovacion(lineaId){
  const cl=getClient();if(!cl)return;
  const linea=cl.lineas.find(l=>l.id===lineaId);if(!linea)return;
  // Calcular capitales internamente (no depender de parámetros del HTML)
  const tiUlt=linea.tramos.length-1;
  const capSolo=capIni(linea,tiUlt);
  const capPrev=Math.round(capFinT(linea,tiUlt));
  const tipo=document.getElementById("m_tipo").value;
  const prod=document.getElementById("m_prod").value.trim();
  const tae=parseFloat(document.getElementById("m_tae").value);
  const ini=document.getElementById("m_ini").value;
  const ven=document.getElementById("m_ven").value;
  const capitaliz=document.getElementById("m_capitaliz").value;
  const rentaTipo=document.getElementById("m_rentaTipo")?.value||"anual";
  const diaCobro=parseInt(document.getElementById("m_diaCobro")?.value||8);
  const primerCobro=document.getElementById("m_primerCobro")?.value||"siguiente";
  if(!prod||isNaN(tae)||!ini||!ven){alert("Completa todos los campos.");return;}
  if(new Date(ven)<=new Date(ini)){alert("El vencimiento debe ser posterior al inicio.");return;}
  const rv=document.getElementById("m_renovTipo").value;
  const extraEl=document.getElementById("m_extra");
  const extraVal=extraEl?parseFloat(extraEl.value)||0:0;
  let cap=capSolo;
  if(rv==="todo") cap=capPrev;
  else if(rv==="solo_cap") cap=capSolo;
  else if(rv==="amplia"){
    if(extraVal<=0){alert("Introduce el importe de la aportación adicional.");return;}
    cap=capSolo+extraVal;
  }
  else if(rv==="parcial"){
    if(extraVal<=0){alert("Introduce el importe personalizado.");return;}
    cap=extraVal;
  }
  if(!cap||cap<=0){alert("El capital de renovación no es válido.");return;}
  const tramo={id:++nTid,tipo,prod,cap,tae,ini,ven,capitaliz,rentaTipo,diaCobro,primerCobro,modalidad45:document.getElementById('m_modalidad45')?.value||'cobrar'};
  const com=leerComisionFormulario(tramo,linea.tramos.length,linea,true);
  // Comisiones por defecto si no se configuraron manualmente
  let comFinal=com;
  if(!comFinal){
    if(tipo==="energia"){
      const pct=2.0; // renovación Inversus: 2%
      const pagos=calcPagosComision(tramo,linea.tramos.length,linea,pct,true);
      comFinal={pct,pagos};
    } else if(tipo==="deposito_oro"){
      const pctVal={pctInicial:4.8,pctAnual:2.0};
      const pagos=calcPagosComision(tramo,linea.tramos.length,linea,pctVal,false);
      comFinal={pct:pctVal,pagos};
    } else if(tipo==="deposito_bonificado"){
      const pctVal={pctInicial:4.8,pctAnual:2.0};
      const pagos=calcPagosComision(tramo,linea.tramos.length,linea,pctVal,false);
      comFinal={pct:pctVal,pagos};
    } else if(tipo==="renta_45"||(TIPOS_BASE[tipo]||{}).renta45){
      // Publicidad: comisión automática 5% o 6% según TAE
      const pagos=calcPagosComision(tramo,linea.tramos.length,linea,null,false);
      if(pagos.length){
        const pctPub=tramo.tae<=2?6:5;
        comFinal={pct:pctPub,pagos};
      }
    }
  }
  if(comFinal)tramo.comision=comFinal;

  // Cerrar el tramo anterior en la fecha de inicio del nuevo (renovación anticipada)
  const tramoAnterior=linea.tramos[linea.tramos.length-1];
  if(tramoAnterior&&tramoAnterior.ini<ini){
    // Si el nuevo empieza antes del vencimiento del anterior → renovación anticipada
    const venAnterior=tramoAnterior.ven||"";
    if(!venAnterior||ini<venAnterior){
      tramoAnterior.ven=ini; // cerrar el anterior en la fecha del nuevo
      tramoAnterior.renovadoAnticipadamenteEl=ini;
    }
  }

  // Verificar que el tramo anterior conserva su pago de vencimiento (35%)
  if(tramoAnterior?.comision?.pagos?.length){
    const pagosAntes=tramoAnterior.comision.pagos;
    const tieneVto=pagosAntes.some(p=>p.concepto&&p.concepto.includes("vencimiento"));
    if(!tieneVto&&tramoAnterior.ven){
      const info2=getComisionInfo(tramoAnterior);
      if(info2.esPreIPO){
        const pct2=typeof tramoAnterior.comision.pct==="number"?tramoAnterior.comision.pct:0;
        const ci2=capIni(linea,linea.tramos.length-1);
        const base2=ci2*pct2/100;
        pagosAntes.push({
          id:pagosAntes.length+1,
          fecha:tramoAnterior.ven,
          pct_tramo:35,
          importe:base2*0.35,
          concepto:"Pre IPO — 35% vencimiento",
          cobrado:false,
          fechaCobro:null
        });
      }
    }
  }

  linea.tramos.push(tramo);

  // Generar comisiones del colaborador para el nuevo tramo si el cliente tiene colaborador
  const cl2=getClient();
  if(cl2?.colaborador&&COLABORADORES_DEF[cl2.colaborador]){
    const colab=COLABORADORES_DEF[cl2.colaborador];
    const ti2=linea.tramos.length-1;
    const tp2=TIPOS[tramo.tipo]||{};
    const prov2=proveedorDeTramo(tramo,tp2);
    if(colab.reglas[prov2]){
      const cobradosAntes2={};
      (tramo.comisionColaborador?.pagos||[]).forEach(p=>{
        if(p.cobrado)cobradosAntes2[p.id]={cobrado:true,fechaCobro:p.fechaCobro};
      });
      const pagosColab=calcPagosColaborador(tramo,ti2,linea,colab);
      pagosColab.forEach(p=>{if(cobradosAntes2[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes2[p.id].fechaCobro;}});
      tramo.comisionColaborador={pagos:pagosColab};
    }
  }

  save();closeModal();activeTab="posiciones";renderAll();
}

  } else {

      <button class="btn green" onclick="guardarEditT(${lineaId},${tramoId},${esPrim},${esVar})">Guardar</button>
    </div>

function guardarEditT(lineaId,tramoId,esPrim,esVar){
  const cl=getClient();if(!cl)return;
  const linea=cl.lineas.find(l=>l.id===lineaId);
  const t=linea.tramos.find(x=>x.id===tramoId);
  const ti2=linea.tramos.indexOf(t);
  const tp=TIPOS[t.tipo]||{};

  // Tipo (solo actualizar si el selector existe y cambió)
  const nuevoTipo=document.getElementById("m_tipo")?.value;
  if(nuevoTipo)t.tipo=nuevoTipo;

  // Capital inicial (solo primer tramo)
  if(esPrim){const c=document.getElementById("e_cap");if(c&&c.value)t.cap=parseFloat(c.value)||t.cap;}

  // Actualizar prod/nombre con el label del tipo
  const tpNuevo=TIPOS[t.tipo]||{};
  // Conservar empresa si la había
  const empresa=t.prod&&t.prod.includes(" — ")?t.prod.split(" — ").slice(1).join(" — "):"";
  t.prod=empresa?`${tpNuevo.label||t.tipo} — ${empresa}`:tpNuevo.label||t.prod;
  linea.nombre=t.prod;

  // Fechas y tae
  t.ini=document.getElementById("m_ini")?.value||t.ini;
  t.tae=parseFloat(document.getElementById("m_tae")?.value)||t.tae;

  if(esVar||t.tipo==="deposito_oro"){
    t.valorFecha=parseFloat(document.getElementById("m_valorFecha")?.value)||t.valorFecha;
    t.fechaVal=document.getElementById("m_fechaVal")?.value||t.fechaVal;
    // Si es Depósito Oro, guardar también la comisión
    if(t.tipo==="deposito_oro"){
      const pctIni=parseFloat(document.getElementById("m_com_pct_ini")?.value)||4.8;
      const pctAnu=parseFloat(document.getElementById("m_com_pct_anu")?.value)||2.0;
      const pctVal={pctInicial:pctIni,pctAnual:pctAnu};
      const cobradosAntes={};
      (t.comision?.pagos||[]).forEach(p=>{if(p.cobrado)cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};});
      const pagos=calcPagosComision(t,ti2,linea,pctVal,false);
      pagos.forEach(p=>{if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}});
      t.comision={pct:pctVal,pagos};
    }
  } else {
    const venEl=document.getElementById("m_ven");
    if(venEl&&venEl.value)t.ven=venEl.value;
    // Capitalización según tipo
    if(tpNuevo.rentaMensual){
      t.capitaliz="pago_mensual";
      t.rentaTipo="anual";
      t.diaCobro=parseInt(document.getElementById("m_diaCobro")?.value||t.diaCobro||8);
      t.primerCobro=document.getElementById("m_primerCobro")?.value||t.primerCobro||"siguiente";
    } else if(esRenta45(t)){
      t.capitaliz="simple";
      t.rentaTipo="anual";
      const mod45=document.getElementById("m_modalidad45")?.value||"cobrar";
      if(mod45==="mixto"){
        t.modalidad45="capitalizar";
        t.periodoCapitalizaDesde=parseInt(document.getElementById("m_periodoDesde")?.value)||2;
      } else {
        t.modalidad45=mod45;
        delete t.periodoCapitalizaDesde;
      }
    } else {
      t.capitaliz=tpNuevo.capitaliz||"simple";
      t.rentaTipo=tpNuevo.rentaTipo||"plazo";
    }
  }

  // Comisión inline
  const activa=document.getElementById("et_com_activa");
  const pctEl=document.getElementById("et_com_pct");
  const tipoEl=document.getElementById("et_com_tipo");
  const tipoC=tipoEl?.value||"";
  if(activa&&activa.checked&&tipoC){
    const esRenov2=ti2>0;
    const cobradosAntes={};
    (t.comision?.pagos||[]).forEach(p=>{if(p.cobrado)cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};});
    let pctVal=null, pagos=[];
    if(tipoC==="gold_opportunity"){
      const pI=parseFloat(document.getElementById("et_com_pct_ini")?.value)||4.8;
      const p1=parseFloat(document.getElementById("et_com_pct_ano1")?.value)||2.88;
      const p2=parseFloat(document.getElementById("et_com_pct_ano2")?.value)||2.88;
      pctVal={pctInicial:pI,pctAno1:p1,pctAno2:p2};
      pagos=calcPagosComision(t,ti2,linea,pctVal,false);
    } else if(tipoC==="deposito_bonificado"){
      const pI=parseFloat(document.getElementById("et_com_pct_ini")?.value)||4.8;
      const pA=parseFloat(document.getElementById("et_com_pct_anu")?.value)||2.0;
      pctVal={pctInicial:pI,pctAnual:pA};
      pagos=calcPagosComision(t,ti2,linea,pctVal,false);
    } else if(tipoC==="publicidad"){
      pctVal=t.tae<=2?6:5;
      pagos=calcPagosComision(t,ti2,linea,pctVal,false);
    } else if(tipoC==="pescados"){
      const pI=parseFloat(document.getElementById("et_com_pct_ini")?.value)||6;
      const p6m=parseFloat(document.getElementById("et_com_pct_6m")?.value)||6;
      pctVal={pctInicial:pI,pct6meses:p6m};
      pagos=calcPagosComision(t,ti2,linea,pI,false);
    } else {
    }
    if(pctVal&&pagos.length){
      pagos.forEach(p=>{if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}});
      t.comision={pct:pctVal,pagos};
    }
  } else if(activa&&!activa.checked){
    delete t.comision;
  }
  save();closeModal();renderAll();
}

function borrarTramo(lineaId,tramoId){
  const cl=getClient();if(!cl)return;
  const linea=cl.lineas.find(l=>l.id===lineaId);
  linea.tramos=linea.tramos.filter(t=>t.id!==tramoId);
  save();closeModal();renderAll();
}

function borrarLinea(lineaId){
  if(!confirm("¿Eliminar esta línea?"))return;
  const cl=getClient();if(!cl)return;
  cl.lineas=cl.lineas.filter(l=>l.id!==lineaId);
  save();renderAll();
}

  const h=hoy();const lineas=cl.lineas||[];

  let capTot=0,rentaCobrada=0,rentaCapitalizada=0,plusvaliaLatente=0,rentaMesTot=0;
  lineas.forEach(l=>{
    if(!l.tramos.length)return;
    // Sumar capital solo del tramo activo en la tabla
    l.tramos.forEach((t,ti)=>{
      if(t.ini>h)return;
      const esIndefinido=!t.ven||t.ven.startsWith("2099");
      if(!esIndefinido&&t.ven<=h)return;
      const sig=l.tramos[ti+1];
      if(sig&&sig.ini<=h)return;
      capTot+=capIni(l,ti);
    });
    // Calcular rentabilidad de todos los tramos
    l.tramos.forEach((t,ti)=>{
      const tp=TIPOS[t.tipo]||{};
      const c=capIni(l,ti);
      if(t.capitaliz==="variable"){
        const diff=(t.valorFecha||c)-c;
        if(diff>=0)rentaCapitalizada+=diff; else plusvaliaLatente+=diff;
      } else if(esRenta45(t)){
        const esCapit=(t.modalidad45||"cobrar")==="capitalizar";
        const desde=t.periodoCapitalizaDesde||null;
        if(esCapit){
          // Solo contabilizar lo realmente acumulado hasta hoy
          const pagos=fechasPagos45(t).filter(p=>p<=h);
          let capAcum=c,cobradoAntes=0;
          pagos.forEach((_,i)=>{
            const periodo=i+1;

            else capAcum+=rentaPeriodo45(capAcum,t.tae);

          rentaCobrada+=cobradoAntes;

        } else {
          // Cobro periódico: solo lo ya cobrado
          rentaCobrada+=rentaAcumT_hoy(l,ti,h);

      } else if(tp.rentaMensual||esPagoMensual(t.capitaliz)){

  const esFechaHistorica=fechaConsulta&&fechaConsulta!==hoyReal();

      const esIndefinido=!t.ven||t.ven.startsWith("2099")||t.capitaliz==="variable";
      if(!esIndefinido&&t.ven<=h)return; // ya había vencido en esa fecha
      // Si hay tramo siguiente que ya empezó, este fue renovado — no mostrar
      const tramosiguiente=l.tramos[ti+1];

      const ci=capIni(l,ti);

    (cl.lineas||[]).forEach(l=>{
      // Solo el tramo activo
      const tramoAct=l.tramos.find((t,ti)=>{
        if(t.ini>h)return false;
        const esIndef=!t.ven||t.ven.startsWith("2099");
        if(!esIndef&&t.ven<=h)return false;
        const sig=l.tramos[ti+1];
        if(sig&&sig.ini<=h)return false;
        return true;
      });
      if(!tramoAct)return;
      const ti=l.tramos.indexOf(tramoAct);
      const tp=TIPOS[tramoAct.tipo]||{};
      const prov=proveedorDeTramo(tramoAct,tp);
      const ci=capIni(l,ti);
      if(!grupos[prov])grupos[prov]={cap:0,clientes:{}};
      grupos[prov].cap+=ci;
      if(!grupos[prov].clientes[cl.id])grupos[prov].clientes[cl.id]={cl,items:[],cap:0};
      grupos[prov].clientes[cl.id].cap+=ci;
      grupos[prov].clientes[cl.id].items.push({l,t:tramoAct,ti,ci,tp});
    });
  });

  const capTotal=Object.values(grupos).reduce((s,g)=>s+g.cap,0);

  let html=`<div class="main-header">
    <div>
      <div class="client-title">🏢 Vista por proveedores</div>
      <div class="client-title-sub">${Object.values(grupos).reduce((s,g)=>s+Object.keys(g.clientes).length,0)} clientes · ${fmtE(capTotal)} capital activo</div>
    </div>
  </div><div style="padding:0 28px 32px">`;

  const provOrdenados=[...ordProv.filter(p=>grupos[p]),...Object.keys(grupos).filter(p=>!ordProv.includes(p))];

  provOrdenados.forEach(prov=>{
    const g=grupos[prov];
    const info=PROVEEDORES[prov]||{color:"#6B6860",icon:"🏢"};
    const pct=capTotal>0?(g.cap/capTotal*100):0;
    const nClientes=Object.keys(g.clientes).length;
    const nProd=Object.values(g.clientes).reduce((s,c)=>s+c.items.length,0);
    const provId=prov.replace(/\s/g,"_");

    html+=`<div class="card" style="margin-bottom:14px;border-left:4px solid ${info.color};padding:0">
      <!-- Cabecera del proveedor — clic para desplegar -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none"
           onclick="toggleProv('prov-${provId}',this)">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:24px">${info.icon}</span>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--c-text)">${prov}</div>
            <div style="font-size:11px;color:var(--c-text3)">${nClientes} cliente${nClientes!==1?"s":""} · ${nProd} producto${nProd!==1?"s":""}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <div style="text-align:right">
            <div style="font-size:11px;color:var(--c-text3);text-transform:uppercase;letter-spacing:.04em">Capital activo</div>
            <div style="font-size:16px;font-weight:800">${fmtE(g.cap)}</div>
            <div style="font-size:10px;color:var(--c-text3)">${pct.toFixed(1)}% del total</div>
          </div>
          <span class="prov-arrow" style="font-size:18px;color:var(--c-text3);transition:transform .2s">▼</span>
        </div>
      </div>
      <!-- Barra de porcentaje -->
      <div style="height:3px;background:var(--c-bg)">
        <div style="height:3px;background:${info.color};width:${pct.toFixed(1)}%;opacity:.6"></div>
      </div>
      <!-- Contenido desplegable -->
      <div id="prov-${provId}" style="display:none">`;

    // Clientes ordenados por nombre
    const clientesOrdenados=Object.values(g.clientes).sort((a,b)=>a.cl.nombre.localeCompare(b.cl.nombre,"es"));

    clientesOrdenados.forEach((cdata,cidx)=>{
      const cl=cdata.cl;
      const clId=`cl-${provId}-${cl.id}`;
      const borderTop=cidx>0?"border-top:1px solid var(--c-border)":"";

      html+=`<div style="${borderTop}">
        <!-- Fila del cliente — clic para desplegar productos -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 20px;cursor:pointer;background:var(--c-bg-soft,rgba(0,0,0,.02))"
             onclick="toggleProv('${clId}',this)">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:28px;height:28px;border-radius:50%;background:${info.color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">
              ${cl.nombre.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()}
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;cursor:pointer;color:var(--c-blue);text-decoration:underline"
                   onclick="event.stopPropagation();state.activeId=${cl.id};activeTab='posiciones';renderAll()">${cl.nombre}</div>
              <div style="font-size:10px;color:var(--c-text3)">${cdata.items.length} producto${cdata.items.length!==1?"s":""}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:13px;font-weight:700">${fmtE(cdata.cap)}</div>
            <span class="prov-arrow" style="font-size:13px;color:var(--c-text3)">▼</span>
          </div>
        </div>
        <!-- Productos del cliente -->
        <div id="${clId}" style="display:none;padding:0 16px 8px 56px">
          ${cdata.items.map(it=>{
            const e=est(it.t);
            const d=it.t.ven&&!it.t.ven.startsWith("2099")?dias(h,it.t.ven):null;
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05)">
              <div>
                <div style="font-size:12px;font-weight:600">${it.t.prod}</div>
                <div style="font-size:10px;color:var(--c-text3)">${it.t.tae.toFixed(2)}% · ${fmtF(it.t.ini)} → ${fmtF(it.t.ven)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="font-size:12px;font-weight:600;text-align:right">${fmtE(it.ci)}</div>
                <span style="font-size:10px;background:${e.col}22;color:${e.col};padding:2px 7px;border-radius:8px;font-weight:600;white-space:nowrap">${e.txt}${d!==null&&d>=0?" ("+d+"d)":""}</span>
              </div>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  html+=`</div>`;
  cont.innerHTML=html;
}

function toggleProv(id,header){
  const el=document.getElementById(id);
  if(!el)return;
  const open=el.style.display==="none";
  el.style.display=open?"block":"none";
  const arrow=header?.querySelector(".prov-arrow");
  if(arrow)arrow.style.transform=open?"rotate(180deg)":"";
}


function getComisionInfo(t){
  const tp=TIPOS[t.tipo]||{};
  const prod=(t.prod||"").toLowerCase();
  const label=(tp.label||"").toLowerCase();
  const esRenta45=tp.renta45===true;
  // PreIPORentas: tipo rentas_mensuales, O tipo preipo* con producto que contenga "renta"
  const esPreIPORentas=t.tipo==="rentas_mensuales"||
    ((prod.includes("renta")||label.includes("renta"))&&t.tipo.startsWith("preipo")&&t.tipo!=="energia");
  const esPreIPO=(t.tipo==="preipo"||(t.tipo.startsWith("preipo")&&!esPreIPORentas))&&!esPreIPORentas;
  const esPublicidad=esRenta45;
  const esDepositoBonificado=t.tipo==="deposito_bonificado";
  const esGoldOpportunity=t.tipo==="gold_opportunity";
  const esDepOro=t.tipo==="deposito_oro";
  const esMensual=tp.rentaMensual===true&&t.tipo!=="energia";
  const esInversus=t.tipo==="energia";
  return {esPreIPO,esPreIPORentas,esPublicidad,esRenta45,esDepositoBonificado,esGoldOpportunity,esDepOro,esMensual,esInversus};
}

function calcPagosComision(t,ti,l,pct,esRenovacion){
  const ci=capIni(l,ti);
  const ini=new Date(t.ini);
  const ven=t.ven&&!t.ven.startsWith("2099")?new Date(t.ven):null;
  const fmtD=d=>d instanceof Date?d.toISOString().split("T")[0]:d;
  const info=getComisionInfo(t);
  const pagos=[];

  // ── Pre IPO ───────────────────────────────────────────────────────────────
  if(info.esPreIPO){
    const base=ci*((pct&&typeof pct==="number"?pct:0)/100);
    const venD=ven||new Date(ini.getFullYear(),ini.getMonth()+15,ini.getDate());
    const mitad=new Date(ini.getTime()+(venD-ini)/2);
    const p1=esRenovacion?15:50, p2=esRenovacion?50:15, p3=35;
    pagos.push({id:1,fecha:fmtD(ini),pct_tramo:p1,importe:base*p1/100,concepto:`Pre IPO — ${p1}% inicio`,cobrado:false,fechaCobro:null});
    pagos.push({id:2,fecha:fmtD(mitad),pct_tramo:p2,importe:base*p2/100,concepto:`Pre IPO — ${p2}% mitad plazo`,cobrado:false,fechaCobro:null});
    if(ven)pagos.push({id:3,fecha:fmtD(ven),pct_tramo:p3,importe:base*p3/100,concepto:`Pre IPO — ${p3}% vencimiento`,cobrado:false,fechaCobro:null});
    return pagos;
  }

  // ── Pescados (Hypocampos) — debe ir ANTES de esMensual ───────────────────
  const tp=TIPOS[t.tipo]||{};
  const esPescados=tp.esPescados===true||(t.tipo==="pescados");
  if(esPescados){
    const pctPescados=typeof pct==="number"?pct:6;
    const dIniPago5=new Date(ini.getFullYear(),ini.getMonth()+1,5);
    pagos.push({
      id:1,fecha:fmtD(dIniPago5),pct_tramo:pctPescados,
      importe:Math.round(ci*pctPescados/100*100)/100,
      concepto:`Pescados — ${pctPescados}% contratación · base ${fmtE(ci)}`,
      cobrado:false,fechaCobro:null
    });
    const d6m5=new Date(ini.getFullYear(),ini.getMonth()+7,5);
    let saldo6m=ci;
    if(t.capitaliz==="mensual"||t.capitaliz==="compuesto"){
      saldo6m=ci*Math.pow(1+t.tae/100,6);
    }
    pagos.push({
      id:2,fecha:fmtD(d6m5),pct_tramo:pctPescados,
      importe:Math.round(saldo6m*pctPescados/100*100)/100,
      concepto:`Pescados — ${pctPescados}% a 6 meses · base ${fmtE(Math.round(saldo6m))}`,
      cobrado:false,fechaCobro:null
    });
    return pagos;
  }

  // ── Rentas Mensuales ─────────────────────────────────────────────────────
  if(info.esPreIPORentas||getComisionInfo(t).esMensual){
    const pctMes=typeof pct==="number"?pct:0;
    const importeMes=ci*(pctMes/100)/12;
    let cur=new Date(ini.getFullYear(),ini.getMonth()+1,1);
    const venLim=ven||new Date(ini.getFullYear(),ini.getMonth()+12,1);
    for(let i=1;i<=12&&cur<=venLim;i++){
      const mes=cur.toLocaleString("es-ES",{month:"long",year:"numeric"});
      pagos.push({id:i,fecha:fmtD(cur),pct_tramo:pctMes/12,importe:importeMes,concepto:`Comisión mensual — ${mes}`,cobrado:false,fechaCobro:null});
      cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    }
    return pagos;
  }

  // ── Depósito Bonificado: 4,8% inicio s/(cap+intereses totales) + 2% anualidad ─
  if(info.esDepositoBonificado){
    const pctIni=(pct&&pct.pctInicial)||4.8;
    const pctAnu=(pct&&pct.pctAnual)||2.0;
    // Base = capital + intereses totales del producto (23,457% por 24 meses sobre capital)
    const interesTotal=calcRenta(ci,t.tae,t.ini,t.ven,"simple","plazo",t.ini,t.ven);
    const baseTotal=ci+interesTotal;
    // Inicio: mes siguiente
    const dIni=new Date(ini.getFullYear(),ini.getMonth()+1,1);
    if(pctIni>0)pagos.push({id:1,fecha:fmtD(dIni),pct_tramo:pctIni,importe:baseTotal*(pctIni/100),
      concepto:`Dep. Bonificado — ${pctIni}% inicio (s/ ${fmtE(baseTotal)})`,cobrado:false,fechaCobro:null});
    // Anualidad: 12 meses
    const d12=new Date(ini);d12.setFullYear(d12.getFullYear()+1);
    const interesA12=calcRenta(ci,t.tae,t.ini,fmtD(d12),"simple","plazo",t.ini,fmtD(d12));
    const base12=ci+interesA12;
    if(pctAnu>0)pagos.push({id:2,fecha:fmtD(d12),pct_tramo:pctAnu,importe:base12*(pctAnu/100),
      concepto:`Dep. Bonificado — ${pctAnu}% anualidad (s/ ${fmtE(base12)})`,cobrado:false,fechaCobro:null});
    return pagos;
  }

  // ── Gold Opportunity: 4,8% inicio + 2,88% año1 + 2,88% año2 s/capital ──
  if(info.esGoldOpportunity){
    const pctIni=(pct&&pct.pctInicial)||4.8;
    const pct1=(pct&&pct.pctAno1)||2.88;
    const pct2=(pct&&pct.pctAno2)||2.88;
    const dIni=new Date(ini.getFullYear(),ini.getMonth()+1,1);
    if(pctIni>0)pagos.push({id:1,fecha:fmtD(dIni),pct_tramo:pctIni,importe:ci*(pctIni/100),
      concepto:`Gold Opp. — ${pctIni}% inicio (s/ ${fmtE(ci)})`,cobrado:false,fechaCobro:null});
    const d12=new Date(ini);d12.setFullYear(d12.getFullYear()+1);
    if(pct1>0)pagos.push({id:2,fecha:fmtD(d12),pct_tramo:pct1,importe:ci*(pct1/100),
      concepto:`Gold Opp. — ${pct1}% año 1 (s/ ${fmtE(ci)})`,cobrado:false,fechaCobro:null});
    const d24=new Date(ini);d24.setFullYear(d24.getFullYear()+2);
    if(pct2>0)pagos.push({id:3,fecha:fmtD(d24),pct_tramo:pct2,importe:ci*(pct2/100),
      concepto:`Gold Opp. — ${pct2}% año 2 (s/ ${fmtE(ci)})`,cobrado:false,fechaCobro:null});
    return pagos;
  }

  // ── Depósito Oro: 4,8% inicio + 2% anual s/capital ──────────────────────
  if(t.tipo==="deposito_oro"){
    const pctIni=(pct&&pct.pctInicial)||4.8;
    const pctAnu=(pct&&pct.pctAnual)||2.0;
    const dIni=new Date(ini.getFullYear(),ini.getMonth()+1,1);
    if(pctIni>0)pagos.push({id:1,fecha:fmtD(dIni),pct_tramo:pctIni,importe:ci*(pctIni/100),
      concepto:`Dep. Oro — ${pctIni}% inicio (s/ ${fmtE(ci)})`,cobrado:false,fechaCobro:null});
    // 2% anual indefinidamente (generar 5 años)
    for(let yr=1;yr<=5;yr++){
      const dYr=new Date(ini);dYr.setFullYear(dYr.getFullYear()+yr);
      pagos.push({id:yr+1,fecha:fmtD(dYr),pct_tramo:pctAnu,importe:ci*(pctAnu/100),
        concepto:`Dep. Oro — ${pctAnu}% año ${yr} (s/ ${fmtE(ci)})`,cobrado:false,fechaCobro:null});
    }
    return pagos;
  }

  // ── Publicidad 45 días ────────────────────────────────────────────────────
  if(info.esPublicidad){
    const tae=t.tae||0;
    const pctPub=tae<=2?6:5;
    const esCapitalizar=(t.modalidad45||"cobrar")==="capitalizar";
    const d1=new Date(ini.getFullYear(),ini.getMonth(),20);
    if(d1<=ini)d1.setMonth(d1.getMonth()+1);
    const d2=new Date(d1);d2.setMonth(d2.getMonth()+6);
    const cap1=esCapitalizar?valCap45En(ci,tae,t.ini,t.ven,fmtD(d1)):ci;
    const cap2=esCapitalizar?valCap45En(ci,tae,t.ini,t.ven,fmtD(d2)):ci;
    const modo=esCapitalizar?" (capitalizado)":"";
    pagos.push({id:1,fecha:fmtD(d1),pct_tramo:pctPub,importe:cap1*(pctPub/100),
      concepto:`Publicidad — ${pctPub}% inicio día 20${modo}`,cobrado:false,fechaCobro:null});
    pagos.push({id:2,fecha:fmtD(d2),pct_tramo:pctPub,importe:cap2*(pctPub/100),
      concepto:`Publicidad — ${pctPub}% 6 meses día 20${modo}`,cobrado:false,fechaCobro:null});
    return pagos;
  }

  // ── Inversus (Energía) ────────────────────────────────────────────────────
  if(t.tipo==="energia"){
    const pctE=typeof pct==="number"?pct:7.0;
    const dIni2=new Date(ini.getFullYear(),ini.getMonth()+1,1);
    pagos.push({id:1,fecha:fmtD(dIni2),pct_tramo:pctE,importe:ci*(pctE/100),
      concepto:`Inversus — ${pctE}% inicio (s/ ${fmtE(ci)})`,cobrado:false,fechaCobro:null});
    return pagos;
  }

  // ── Genérico ──────────────────────────────────────────────────────────────
  const pctG=typeof pct==="number"?pct:0;
  if(pctG>0&&ven){
    pagos.push({id:1,fecha:fmtD(ven),pct_tramo:pctG,importe:ci*(pctG/100),
      concepto:`Comisión — ${pctG}%`,cobrado:false,fechaCobro:null});
  }
  return pagos;
}

  const t=l.tramos.find(x=>x.id===tramoId);if(!t)return;
  const ti=l.tramos.indexOf(t);
  const ci=capIni(l,ti);
  const info=getComisionInfo(t);
  const com=t.comision||{};
  const esRenov=ti>0;
  const fmtD=d=>d instanceof Date?d.toISOString().split("T")[0]:d;

  // Calcular valores base para mostrar en el modal
  let titulo="", html="";

  if(info.esPreIPO){
    const pct=typeof com.pct==="number"?com.pct:"";

    titulo=`Pre IPO — ${esRenov?"Renovación":"Primera vez"}`;

      <div class="info-box" style="margin-bottom:10px">

  else if(info.esMensual||info.esPreIPORentas){

      <div class="info-box" style="margin-bottom:10px">

    const pctAnu=typeof com.pct==="object"&&com.pct?com.pct.pctAnual||2.0:2.0;

    const base12=ci+int12;
    titulo="Depósito Bonificado";

      <div class="info-box" style="margin-bottom:10px">
        Comisión inicial s/ capital+intereses totales: <strong>${fmtE(baseTotal)}</strong><br>

function previewComisionSimple(ci,tipo,esRenov){
  const pct=parseFloat(document.getElementById("com_pct_1")?.value)||0;
  const prev=document.getElementById("com_preview");
  if(!prev||!pct){if(prev)prev.innerHTML="";return;}
  let html="",total=0;
  if(tipo==="preipo"){
    const p1=esRenov?15:50, p2=esRenov?50:15;
    const base=ci*(pct/100);
    const filas=[{l:`${p1}% inicio`,v:base*p1/100},{l:`${p2}% mitad`,v:base*p2/100},{l:`35% vencimiento`,v:base*0.35}];
    filas.forEach(f=>{total+=f.v;html+=fila(f.l,f.v);});
  } else if(tipo==="mensual"){
    const mes=ci*(pct/100)/12;total=mes*12;
    html=fila(`${fmtE(mes)}/mes × 12 meses`,total);
  } else if(tipo==="inversus"){
    total=ci*(pct/100);html=fila(`${pct}% sobre ${fmtE(ci)}`,total);
  } else {
    total=ci*(pct/100);html=fila(`${pct}%`,total);
  }
  html+=`<div style="display:flex;justify-content:space-between;padding:6px 8px;font-weight:700;margin-top:4px"><span>Total</span><span style="color:var(--c-green)">+${fmtE(total)}</span></div>`;
  prev.innerHTML=html;
  function fila(l,v){return `<div style="display:flex;justify-content:space-between;padding:4px 8px;background:var(--c-bg);border-radius:4px;margin-bottom:3px"><span style="color:var(--c-text2)">${l}</span><strong style="color:var(--c-green)">+${fmtE(v)}</strong></div>`;}
}


function previewGoldOpp(bIni,b12,b24){
  const pctIni=parseFloat(document.getElementById("com_pct_ini")?.value)||0;
  const pct1=parseFloat(document.getElementById("com_pct_ano1")?.value)||0;
  const pct2=parseFloat(document.getElementById("com_pct_ano2")?.value)||0;
  const prev=document.getElementById("com_preview");if(!prev)return;
  let html="",total=0;
  const fila=(concepto,base,pct)=>{
    const imp=base*(pct/100);total+=imp;
    return `<div style="display:flex;justify-content:space-between;padding:4px 8px;background:var(--c-bg);border-radius:4px;margin-bottom:3px">
      <span style="color:var(--c-text2)">${concepto} (${pct}% s/ ${fmtE(base)})</span><strong style="color:var(--c-green)">+${fmtE(imp)}</strong></div>`;
  };
  if(pctIni>0)html+=fila("Inicial",bIni,pctIni);
  if(pct1>0)html+=fila("Año 1",b12,pct1);
  if(pct2>0)html+=fila("Año 2",b24,pct2);
  if(total>0)html+=`<div style="display:flex;justify-content:space-between;padding:6px 8px;font-weight:700;margin-top:4px">
    <span>Total</span><span style="color:var(--c-green)">+${fmtE(total)}</span></div>`;
  prev.innerHTML=html;
}

function guardarComisionModal(lineaId,tramoId,esRenov){
  const cl=getClient();if(!cl)return;
  const l=cl.lineas.find(x=>x.id===lineaId);if(!l)return;
  const t=l.tramos.find(x=>x.id===tramoId);if(!t)return;
  const ti=l.tramos.indexOf(t);
  const info=getComisionInfo(t);
  const cobradosAntes={};
  (t.comision?.pagos||[]).forEach(p=>{if(p.cobrado)cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};});

  let pctVal=null, pagos=[];

  if(info.esPreIPO||info.esMensual||info.esPreIPORentas||info.esInversus){
    const pct=parseFloat(document.getElementById("com_pct_1")?.value)||0;
    if(!pct){alert("Introduce un % de comisión.");return;}
    pctVal=pct;
    pagos=calcPagosComision(t,ti,l,pct,esRenov);
  }
  else if(info.esDepositoBonificado){
    const pctIni=parseFloat(document.getElementById("com_pct_1")?.value)||4.8;
    const pctAnu=parseFloat(document.getElementById("com_pct_2")?.value)||2.0;
    pctVal={pctInicial:pctIni,pctAnual:pctAnu};
    pagos=calcPagosComision(t,ti,l,pctVal,false);
  }
  else if(info.esGoldOpportunity){
    const pctIni=parseFloat(document.getElementById("com_pct_1")?.value)||4.8;
    const pctAno1=parseFloat(document.getElementById("com_pct_ano1")?.value)||2.88;
    const pctAno2=parseFloat(document.getElementById("com_pct_ano2")?.value)||2.88;
    pctVal={pctInicial:pctIni,pctAno1,pctAno2};
    pagos=calcPagosComision(t,ti,l,pctVal,false);
  }
  else if(info.esDepOro){
    const pctIni=parseFloat(document.getElementById("com_pct_1")?.value)||4.8;
    const pctAnu=parseFloat(document.getElementById("com_pct_2")?.value)||2.0;
    pctVal={pctInicial:pctIni,pctAnual:pctAnu};
    pagos=calcPagosComision(t,ti,l,pctVal,false);
  }
  else if(info.esPublicidad){
    const pct=t.tae<=2?6:5;
    pctVal=pct;
    pagos=calcPagosComision(t,ti,l,pct,false);
  }
  else {
    const pct=parseFloat(document.getElementById("com_pct_1")?.value)||0;
    if(!pct){alert("Introduce un % de comisión.");return;}
    pctVal=pct;
    const ci=capIni(l,ti);
    const ven=t.ven&&!t.ven.startsWith("2099")?t.ven:null;
    if(ven)pagos=[{id:1,fecha:ven,pct_tramo:pct,importe:ci*(pct/100),concepto:`Comisión ${pct}%`,cobrado:false,fechaCobro:null}];
  }

  pagos.forEach(p=>{if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}});
  t.comision={pct:pctVal,pagos};
  save();closeModal();renderAll();
}


function guardarComision(lineaId,tramoId,esRenov){
  guardarComisionModal(lineaId,tramoId,esRenov);
}

function eliminarComision(lineaId,tramoId){
  const cl=getClient();if(!cl)return;
  const l=cl.lineas.find(x=>x.id===lineaId);if(!l)return;
  const t=l.tramos.find(x=>x.id===tramoId);if(!t)return;
  if(!confirm("¿Eliminar la comisión de esta inversión?"))return;
  delete t.comision;
  save();closeModal();renderAll();
}

function marcarPagoCobrado(clId,lId,tId,pagoId,cobrado){
  const cl=state.clientes.find(c=>c.id===clId);if(!cl)return;
  const l=cl.lineas.find(x=>x.id===lId);if(!l)return;
  const t=l.tramos.find(x=>x.id===tId);if(!t?.comision)return;
  const p=t.comision.pagos?.find(x=>x.id===pagoId);if(!p)return;
  p.cobrado=cobrado;
  p.fechaCobro=cobrado?hoy():null;
  save();renderComisiones();
}

// ─── COLABORADORES ───────────────────────────────────────────────────────────
const COLABORADORES_DEF={
  "Felix Tena Briceño":{
    nombre:"Felix Tena Briceño",
    color:"#5A2D8A",
    tipo:"reglas_propias",
    reglas:{
      "Triple A":{tipo:"preipo_style", pct:7.0},
      "The Real Money":{tipo:"deposito_style", pctInicial:2.0, pctAnual:1.0},
      "Inversus":{tipo:"inicio_solo", pct:2.0},
      "Make a Mark":{tipo:"publicidad_style", pct:2.0}
    }
  }
};

function calcPagosColaborador(t,ti,l,colaborador){
  // Tipo porcentaje_comision: X% de los pagos propios del gestor
  if(colaborador.tipo==="porcentaje_comision"){
    const pct=colaborador.pct/100;
    const pagosBase=t.comision?.pagos||[];
    if(!pagosBase.length)return [];
    return pagosBase.map((p,i)=>({
      id:i+1,
      fecha:p.fecha,
      importe:Math.round(p.importe*pct*100)/100,
      concepto:`${colaborador.pct}% de "${p.concepto}"`,
      cobrado:false,
      fechaCobro:null
    }));
  }

  // Tipo reglas_propias (Felix): calcular según sus reglas específicas
  const tp=TIPOS[t.tipo]||{};
  const prov=proveedorDeTramo(t,tp);
  const regla=colaborador.reglas[prov];
  if(!regla)return [];
  const ci=capIni(l,ti);
  const ini=new Date(t.ini);
  const ven=t.ven&&!t.ven.startsWith("2099")?new Date(t.ven):null;
  const fmtD=d=>d.toISOString().split("T")[0];
  const dIniPago=new Date(ini.getFullYear(),ini.getMonth()+1,1);
  const pagos=[];

  if(regla.tipo==="preipo_style"){
    // 7% repartido 50/15/35 (igual estructura que comisión propia)
    const esRenov=ti>0;
    const base=ci*regla.pct/100;
    const p1=esRenov?15:50, p2=esRenov?50:15;
    const venD=ven||new Date(ini.getFullYear(),ini.getMonth()+15,ini.getDate());
    const mitad=new Date(ini.getTime()+(venD-ini)/2);
    pagos.push({id:1,fecha:fmtD(dIniPago),importe:base*p1/100,concepto:`${p1}% inicio · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});
    pagos.push({id:2,fecha:fmtD(mitad),importe:base*p2/100,concepto:`${p2}% mitad · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});
    if(ven)pagos.push({id:3,fecha:fmtD(ven),importe:base*0.35,concepto:`35% vencimiento · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});

  } else if(regla.tipo==="deposito_style"){
    // 2% contratación + 1% anualidad sobre capital
    pagos.push({id:1,fecha:fmtD(dIniPago),importe:ci*regla.pctInicial/100,concepto:`${regla.pctInicial}% contratación · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});
    // Anualidades (hasta vencimiento o 5 años)
    const maxAnios=ven?Math.min(5,Math.ceil((ven-ini)/(365*864e5))):5;
    for(let yr=1;yr<=maxAnios;yr++){
      const dAnu=new Date(ini.getFullYear()+yr,ini.getMonth(),ini.getDate());
      if(!ven||dAnu<=ven)
        pagos.push({id:yr+1,fecha:fmtD(dAnu),importe:ci*regla.pctAnual/100,concepto:`${regla.pctAnual}% anualidad año ${yr} · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});
    }

  } else if(regla.tipo==="inicio_solo"){
    // Solo contratación
    pagos.push({id:1,fecha:fmtD(dIniPago),importe:ci*regla.pct/100,concepto:`${regla.pct}% contratación · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});

  } else if(regla.tipo==="publicidad_style"){
    // Usar las mismas fechas que mis comisiones para que coincidan
    const misPageos=t.comision?.pagos||[];
    if(misPageos.length>=1){
      const esCapit=(t.modalidad45||"cobrar")==="capitalizar";
      // Pago 1: misma fecha que mi primer pago
      pagos.push({id:1,fecha:misPageos[0].fecha,importe:ci*regla.pct/100,
        concepto:`${regla.pct}% contratación · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});
      // Pago 2: misma fecha que mi segundo pago
      if(misPageos.length>=2){
        const base6m=esCapit?valCap45En(ci,t.tae,t.ini,t.ven,misPageos[1].fecha,t.periodoCapitalizaDesde):ci;
        pagos.push({id:2,fecha:misPageos[1].fecha,importe:base6m*regla.pct/100,
          concepto:`${regla.pct}% a 6 meses · base ${fmtE(base6m)}${esCapit?" (acumulado)":""}`,cobrado:false,fechaCobro:null});
      }
    } else {
      // Si no hay mis pagos, calcular por fecha
      pagos.push({id:1,fecha:fmtD(dIniPago),importe:ci*regla.pct/100,
        concepto:`${regla.pct}% contratación · base ${fmtE(ci)}`,cobrado:false,fechaCobro:null});
      const d6m=new Date(ini.getFullYear(),ini.getMonth()+6,ini.getDate());
      const esCapit=(t.modalidad45||"cobrar")==="capitalizar";
      const base6m=esCapit?valCap45En(ci,t.tae,t.ini,t.ven,fmtD(d6m),t.periodoCapitalizaDesde):ci;
      if(!ven||d6m<=ven)
        pagos.push({id:2,fecha:fmtD(d6m),importe:base6m*regla.pct/100,
          concepto:`${regla.pct}% a 6 meses · base ${fmtE(base6m)}${esCapit?" (acumulado)":""}`,cobrado:false,fechaCobro:null});
    }
  }

  return pagos;
}

function getComisionesColaboradorCliente(cl,colaborador){
  // Devuelve todos los pagos del colaborador para este cliente
  const todos=[];
  (cl.lineas||[]).forEach(l=>{
    l.tramos.forEach((t,ti)=>{
      if(!cl.colaborador||cl.colaborador!==colaborador.nombre)return;
      const pagos=(t.comisionColaborador?.pagos)||[];
      pagos.forEach(p=>todos.push({cl,l,t,ti,p,prov:proveedorDeTramo(t,TIPOS[t.tipo]||{})}));
    });
  });
  return todos;
}

function generarComisionesColaborador(cl,colaborador){
  (cl.lineas||[]).forEach(l=>{
    l.tramos.forEach((t,ti)=>{
      if(t.tipo==="pescados"||TIPOS[t.tipo]?.esPescados)return; // Pescados — no regenerar
      // Para porcentaje_comision: necesita que el tramo tenga comisión propia
      if(colaborador.tipo==="porcentaje_comision"){
        if(!t.comision?.pagos?.length)return;
        const cobradosAntes={};
        (t.comisionColaborador?.pagos||[]).forEach(p=>{
          if(p.cobrado)cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};
        });
        const pagos=calcPagosColaborador(t,ti,l,colaborador);
        pagos.forEach(p=>{if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}});
        t.comisionColaborador={pagos};
        return;
      }
      // Para reglas_propias (Felix)
      const tp=TIPOS[t.tipo]||{};
      const prov=proveedorDeTramo(t,tp);
      if(!colaborador.reglas[prov])return;
      const cobradosAntes={};
      (t.comisionColaborador?.pagos||[]).forEach(p=>{
        if(p.cobrado)cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};
      });
      const pagos=calcPagosColaborador(t,ti,l,colaborador);
      pagos.forEach(p=>{if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}});
      t.comisionColaborador={pagos};
    });
  });
}

function guardarCancelacion(lineaId){
  const cl=getClient();if(!cl)return;
  const linea=cl.lineas.find(l=>l.id===lineaId);if(!linea)return;
  const ti=linea.tramos.length-1;
  const t=linea.tramos[ti];
  const ci=capIni(linea,ti);

  const fecha=document.getElementById("ca_fecha")?.value;
  const tipo=document.getElementById("ca_tipo")?.value;
  const capRestante=tipo==="parcial"?(parseFloat(document.getElementById("ca_cap_restante")?.value)||0):0;

  if(!fecha){alert("Indica la fecha de cancelación.");return;}
  if(fecha<t.ini){alert("La fecha de cancelación no puede ser anterior al inicio.");return;}
  if(tipo==="parcial"&&capRestante<=0){alert("Indica el capital que queda.");return;}
  if(tipo==="parcial"&&capRestante>=ci){alert("El capital restante debe ser menor que el capital actual.");return;}

  // Cerrar el tramo actual en la fecha de cancelación
  t.ven=fecha;
  t.cancelado=true;
  t.tipoCancelacion=tipo;
  t.capRetirado=tipo==="total"?ci:ci-capRestante;

  // Si es parcial, crear nuevo tramo con el capital restante
  if(tipo==="parcial"&&capRestante>0){
    const nuevoTramo={
      id:++nTid,
      tipo:t.tipo,
      prod:t.prod,
      cap:capRestante,
      tae:t.tae,
      ini:fecha,
      ven:linea.tramos[0].ven, // mantener fecha original de vencimiento
      capitaliz:t.capitaliz,
      rentaTipo:t.rentaTipo,
      diaCobro:t.diaCobro,
      primerCobro:t.primerCobro,
      modalidad45:t.modalidad45
    };
    linea.tramos.push(nuevoTramo);
  }

  save();closeModal();renderAll();
  alert(`✅ Cancelación registrada.\n${tipo==="total"
    ?`Capital retirado: ${fmtE(ci)} el ${fecha.split("-").reverse().join("/")}`
    :` Capital retirado: ${fmtE(ci-capRestante)}\nCapital restante: ${fmtE(capRestante)}`
  }`);
}

  gestionarColaboradores();
}

function proveedorDeTramo(t,tp){
  const tipo=t.tipo||"";
  const prod=(t.prod||"").toLowerCase();

  // Primero detectar por tipo (cubre tipos legacy y tipos base)
  if(tipo.startsWith("preipo")||tipo==="rentas_mensuales")return "Triple A";
  if(tipo==="deposito_bonificado"||tipo==="gold_opportunity"||tipo==="deposito_oro")return "The Real Money";
  if(tipo==="renta_45"||(TIPOS_BASE[tipo]||{}).renta45)return "Make a Mark";
  if(tipo==="pescados"||(TIPOS_BASE[tipo]||{}).esPescados)return "Hypocampos";

  // Si el tipo está en TIPOS_BASE y tiene proveedor, usar ese
  if(TIPOS_BASE[tipo]?.proveedor)return TIPOS_BASE[tipo].proveedor;

  // Detectar por nombre del producto como fallback
  if(prod.includes("pre ipo")||prod.includes("preipo"))return "Triple A";
  if(prod.includes("deposito bonificado")||prod.includes("gold opportunity")||prod.includes("deposito oro")||prod.includes("dep. oro")||prod.includes("dep. bonif"))return "The Real Money";
  if(prod.includes("publicidad")||prod.includes("visa")||prod.includes("make a mark"))return "Make a Mark";
  if(prod.includes("renta 12")||prod.includes("energi")||prod.includes("inversus"))return "Inversus";

  return tp?.proveedor||"Otros";
}

function aplicarComisionesDepOro(){
  let sinComision=[], conComision=[];

  (state.clientes||[]).forEach(cl=>{
    (cl.lineas||[]).forEach(l=>{
      l.tramos.forEach((t,ti)=>{
        if(t.tipo!=="deposito_oro")return;
        if(t.comision?.pagos?.length) conComision.push({cl,l,t,ti});
        else sinComision.push({cl,l,t,ti});
      });
    });
  });

  const total=sinComision.length+conComision.length;
  if(!total){alert("No se encontraron Depósitos Oro.");return;}

  let msg=`Se encontraron ${total} Depósito${total!==1?"s":""} Oro.\n\n`;
  if(sinComision.length) msg+=`• ${sinComision.length} sin comisión → se generarán\n`;
  if(conComision.length) msg+=`• ${conComision.length} ya tienen comisión → se REGENERARÁN (4,8% inicio + 2% anual)\n`;
  msg+=`\n¿Continuar?`;

  if(!confirm(msg))return;

  let aplicados=0;
  [...sinComision,...conComision].forEach(({cl,l,t,ti})=>{
    const ci=capIni(l,ti);
    const cobradosAntes={};
    // Preservar los ya cobrados
    (t.comision?.pagos||[]).forEach(p=>{
      if(p.cobrado) cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};
    });
    const pctVal={pctInicial:4.8,pctAnual:2.0};
    const pagos=calcPagosComision(t,ti,l,pctVal,false);
    pagos.forEach(p=>{if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}});
    t.comision={pct:pctVal,pagos};
    aplicados++;
  });

  save();renderAll();
  alert(`✅ Comisiones generadas/regeneradas en ${aplicados} Depósito${aplicados!==1?"s":""} Oro.`);
}

function regenerarComisionesPescados(){
  let regenerados=0;
  let debug=[];
  // Detectar productos Pescados por tipo O por nombre de producto que contenga "pescado"
  const esPescadoTramo=t=>{
    if(t.tipo==="pescados")return true;
    if(TIPOS[t.tipo]?.esPescados)return true;
    if((t.prod||"").toLowerCase().includes("pescado"))return true;
    return false;
  };
  state.clientes.forEach(cl=>{
    (cl.lineas||[]).forEach(l=>{
      l.tramos.forEach((t,ti)=>{
        if(!esPescadoTramo(t))return;
        // Forzar tipo correcto
        t.tipo="pescados";
        const pctGuardado=typeof t.comision?.pct==="object"
          ?t.comision.pct.pctInicial||6
          :typeof t.comision?.pct==="number"?t.comision.pct:6;
        const ci=capIni(l,ti);
        const cobradosAntes={};
        (t.comision?.pagos||[]).forEach(p=>{
          if(p.cobrado)cobradosAntes[p.id]={cobrado:true,fechaCobro:p.fechaCobro};
        });
        const pagos=calcPagosComision(t,ti,l,pctGuardado,false);
        debug.push(`${cl.nombre}: ci=${ci} pct=${pctGuardado} pagos=${pagos.length} → ${pagos.map(p=>fmtE(p.importe)).join(', ')}`);
        pagos.forEach(p=>{
          if(cobradosAntes[p.id]){p.cobrado=true;p.fechaCobro=cobradosAntes[p.id].fechaCobro;}
        });
        t.comision={pct:{pctInicial:pctGuardado,pct6meses:pctGuardado},pagos};
        regenerados++;
      });
    });
  });
  if(!regenerados){
    alert(`No se encontraron inversiones de Pescados.\n\nProductos escaneados con tipo "pescados" o nombre que contenga "pescado".\nRevisa que el tipo del producto sea correcto.`);
    return;
  }
  save();renderAll();
  alert(`✅ ${regenerados} inversión(es) regeneradas:\n\n${debug.join('\n')}`);
}


function aplicarComisionesDefecto(){
  let aplicados=0;
  (state.clientes||[]).forEach(cl=>{
    (cl.lineas||[]).forEach(l=>{
      l.tramos.forEach((t,ti)=>{
        if(t.comision?.pagos?.length)return;
        if(t.tipo==="energia"){
          const esRenov=ti>0;
          const pct=esRenov?2.0:7.0;
          const pagos=calcPagosComision(t,ti,l,pct,esRenov);
          t.comision={pct,pagos};
          aplicados++;
        } else if(t.tipo==="deposito_oro"){
          const pctVal={pctInicial:4.8,pctAnual:2.0};
          const pagos=calcPagosComision(t,ti,l,pctVal,false);
          t.comision={pct:pctVal,pagos};
          aplicados++;
        } else if(t.tipo==="deposito_bonificado"){
          const pctVal={pctInicial:4.8,pctAnual:2.0};
          const pagos=calcPagosComision(t,ti,l,pctVal,false);

}

      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--c-border)">
          <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--c-text3);text-transform:uppercase">Cliente</th>
          <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--c-text3);text-transform:uppercase">Producto</th>
          <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--c-text3);text-transform:uppercase">Proveedor</th>
          <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--c-text3);text-transform:uppercase">Capital</th>

function verVencimientos(){
  // Marcar botón activo
  document.querySelectorAll(".sb-client").forEach(el=>el.classList.remove("active"));
  document.getElementById("sb-btn-prov")?.classList.remove("active");
  document.getElementById("sb-btn-venc")?.classList.add("active");
  state.activeId=null;
  renderVencimientos();
}

function renderVencimientos(){
  const cont=document.getElementById("main-content");
  const h=hoy();
  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  // Recoger todos los vencimientos de todos los clientes
  const items=[];
  state.clientes.forEach(cl=>{
    (cl.lineas||[]).forEach(l=>{
      l.tramos.forEach((t,ti)=>{
        if(t.capitaliz==="variable") return; // variables no vencen
        if(t.cancelado===true) return; // cancelados no aparecen en vencimientos
        const ci=capIni(l,ti);
        const renta=rentaAcumT(l,ti);
        const d=dias(h,t.ven);
        const vencido=t.ven<h;
        const urgente=!vencido&&d<=30;
        const proximo=!vencido&&d>30&&d<=90;
        const futuro=!vencido&&d>90;
        items.push({
          cliente:cl.nombre, clienteId:cl.id,
          linea:l.nombre, lineaId:l.id, tramoId:t.id,
          prod:t.prod, tipo:(TIPOS[t.tipo]||{}).label||t.tipo,
          cap:ci, renta, tae:t.tae, ini:t.ini, ven:t.ven,
          dias:d, vencido, urgente, proximo, futuro,
          capitaliz:t.capitaliz, es45:esRenta45(t),
          renovado: ti < l.tramos.length-1  // tiene tramo siguiente = ya renovado
        });
      });
    });
  });

  // Separar por estado
  const vencidos=items.filter(i=>i.vencido&&!i.renovado);
  const urgentes=items.filter(i=>i.urgente);
  const proximos=items.filter(i=>i.proximo);
  const futuros=items.filter(i=>i.futuro);

  // Agrupar futuros por mes
  const porMes={};
  [...urgentes,...proximos,...futuros].forEach(it=>{
    const key=it.ven.slice(0,7);
    if(!porMes[key]) porMes[key]=[];
    porMes[key].push(it);
  });
  const mesesOrdenados=Object.keys(porMes).sort();

  const fmtF=f=>f?f.split("-").reverse().join("/"):"—";

  function cardVenc(it){
    const colBorde=it.vencido?"#8A1A1A":it.urgente?"#C47A1A":it.proximo?"#1A4F8A":"#2E9E6A";
    const colBg=it.vencido?"#FDF2F2":it.urgente?"#FDF7EF":it.proximo?"#EEF4FB":"#F2FAF6";
    const badge=it.vencido
      ?`<span style="background:#FCEBEB;color:#791F1F;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">Vencido</span>`
      :it.urgente
      ?`<span style="background:#FEF3E2;color:#7A4A00;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">⚡ ${it.dias}d</span>`
      :it.proximo
      ?`<span style="background:#E3EEF9;color:#1A4F8A;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${it.dias}d</span>`
      :`<span style="background:#E3F4EC;color:#085041;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${it.dias}d</span>`;
    const renovBadge=it.renovado
      ?`<span style="background:#E3F4EC;color:#085041;padding:2px 7px;border-radius:4px;font-size:10px;margin-left:4px">✓ Renovado</span>`:"";
    const accion=it.vencido&&!it.renovado
      ?`<div style="display:flex;flex-direction:column;gap:5px">
          <button class="btn amber sm" onclick="state.activeId=${it.clienteId};activeTab='posiciones';renderAll();setTimeout(()=>showModal('renovar',${it.lineaId}),50)" style="font-size:11px;padding:4px 12px">+ Renovar</button>
          <button class="btn sm" onclick="state.activeId=${it.clienteId};activeTab='posiciones';renderAll();setTimeout(()=>editTramo(${it.lineaId},${it.tramoId}),50)" style="font-size:11px;padding:4px 12px">Ver / Editar</button>
        </div>`
      :`<div style="display:flex;flex-direction:column;gap:5px">
          <button class="btn amber sm" onclick="state.activeId=${it.clienteId};activeTab='posiciones';renderAll();setTimeout(()=>showModal('renovar',${it.lineaId}),50)" style="font-size:11px;padding:4px 12px">+ Renovar</button>
          <button class="btn sm" onclick="state.activeId=${it.clienteId};activeTab='posiciones';renderAll();setTimeout(()=>editTramo(${it.lineaId},${it.tramoId}),50)" style="font-size:11px;padding:4px 12px">Ver / Editar</button>
        </div>`;
    return `<div style="background:${colBg};border:1px solid ${colBorde}33;border-left:3px solid ${colBorde};border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:13px;font-weight:600;color:var(--c-text)">${it.linea}</span>
          <span style="font-size:11px;color:var(--c-text3)">·</span>
          <span style="font-size:12px;color:var(--c-text2)">${it.cliente}</span>
          ${renovBadge}
        </div>
        <div style="font-size:12px;color:var(--c-text2);margin-bottom:3px">${it.prod} <span style="color:var(--c-text3)">·</span> ${it.tipo}</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--c-text3)">💵 <strong style="color:var(--c-text)">${fmtE(it.cap)}</strong></span>
          <span style="font-size:11px;color:var(--c-text3)">📊 <strong style="color:var(--c-text)">${it.tae.toFixed(2)}%${it.es45?" /45d":""}</strong></span>
          <span style="font-size:11px;color:var(--c-text3)">🗓️ <strong style="color:var(--c-text)">${fmtF(it.ini)} → ${fmtF(it.ven)}</strong></span>
          <span style="font-size:11px;color:#1A7A52">✅ +${fmtE(it.renta)} al vto.</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        ${badge}
        ${accion}
      </div>
    </div>`;
  }

  function seccion(titulo,color,icono,lista,extra=""){
    if(!lista.length) return "";
    return `<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:16px">${icono}</span>
        <span style="font-size:14px;font-weight:700;color:${color}">${titulo}</span>
        <span style="background:${color}22;color:${color};padding:1px 8px;border-radius:10px;font-size:12px;font-weight:600">${lista.length}</span>
        ${extra}
      </div>
      ${lista.map(cardVenc).join("")}
    </div>`;
  }

  // Calcular capital total próximo a vencer en 90 días
  const capProx=[...urgentes,...proximos].reduce((s,i)=>s+i.cap,0);
  const capVencido=vencidos.reduce((s,i)=>s+i.cap,0);

  let html=`
    <div class="main-header">
      <div>
        <div class="client-title">📅 Control de vencimientos</div>
        <div class="client-title-sub">Todos los clientes · ${items.length} posiciones activas</div>
      </div>
    </div>`;

  // KPIs resumen
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px">

    // Timeline por mes
    mesesOrdenados.forEach(mesKey=>{
      const lista=porMes[mesKey];
      const [yy,mm]=mesKey.split("-");
      const nombreMes=MESES[parseInt(mm)-1]+" "+yy;
      const capMes=lista.reduce((s,i)=>s+i.cap,0);
      const hayUrgentes=lista.some(i=>i.urgente);

      html+=`<div class="empty"><div class="icon">✅</div><p>Todo en orden. No hay vencimientos próximos.</p></div>`;
    }
  }

  html+=`</div>`;
  cont.innerHTML=html;
}

// ─── SEGURIDAD: CIFRADO AES-GCM CON WEB CRYPTO API ──────────────────────────
const STORAGE_KEY="patrimonioApp_v2";
const SALT_KEY="patrimonioApp_salt";
let _cryptoKey=null; // clave derivada de la contraseña, en memoria

async function derivarClave(password, salt){
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(password),{name:"PBKDF2"},false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},
    keyMaterial,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]
  );
}

async function cifrar(data, key){
  const enc=new TextEncoder();
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const encrypted=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc.encode(JSON.stringify(data)));
  // Combinar iv + datos cifrados en base64
  const buf=new Uint8Array(iv.byteLength+encrypted.byteLength);
  buf.set(iv,0);buf.set(new Uint8Array(encrypted),iv.byteLength);
  return btoa(String.fromCharCode(...buf));
}

async function descifrar(b64, key){
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const iv=buf.slice(0,12);
  const data=buf.slice(12);
  const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

async function saveSeguro(){
  // Guardar en Firebase si está disponible
  if(window._fbReady&&_cryptoKey){
    try{
      const cifrado=await cifrar(JSON.stringify(state),_cryptoKey);
      const fbDocRef=window._fbDoc(window._fbDb,"patrimonio","datos");
      await window._fbSetDoc(fbDocRef,{
        datos:cifrado,
        ts:Date.now()
      });
    }catch(e){console.warn("Firebase save error:",e);}
  }
  if(!_cryptoKey)return;
  try{
    const cifrado=await cifrar(state,_cryptoKey);
    localStorage.setItem(STORAGE_KEY,cifrado);
    const t=document.getElementById("toast");
    if(t){t.classList.add("show");clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove("show"),1800);}
    // Exportar backup automático cada 5 guardados
    _saveCount++;
    if(_saveCount%5===0){
      exportarBackupAutomatico();
      const t2=document.getElementById("toast");
      if(t2){t2.textContent="💾 Backup automático descargado";t2.classList.add("show");clearTimeout(t2._to);t2._to=setTimeout(()=>{t2.classList.remove("show");t2.textContent="✓ Guardado";},3000);}
    }
  }catch(e){console.error("Error al guardar:",e);}
}

async function loadSeguro(key){
  const d=localStorage.getItem(STORAGE_KEY);
  if(!d) return false; // primera vez, no hay datos
  try{
    // Intentar descifrar — si falla la contraseña es incorrecta
    const datos=await descifrar(d,key);
    if(!datos||typeof datos!=="object") return false;
    state=datos;
    if(!state.clientes)state.clientes=[];
    if(!state.tiposPersonalizados)state.tiposPersonalizados={};
    if(state.clientes.length&&!state.activeId)state.activeId=state.clientes[0].id;
    return true;
  }catch(e){
    return false; // contraseña incorrecta
  }
}

async function intentarAcceso(){
  const pass=document.getElementById("login-pass").value;
  const errEl=document.getElementById("login-err");
  const hintEl=document.getElementById("login-hint");
  errEl.textContent="";
  if(!pass){errEl.textContent="Introduce tu contraseña.";return;}

  const btn=document.querySelector(".login-btn");
  btn.textContent="Verificando...";btn.disabled=true;

  try{
    // Obtener o crear salt
    let saltB64=localStorage.getItem(SALT_KEY);
    let salt;
    if(!saltB64){
      salt=crypto.getRandomValues(new Uint8Array(16));
      localStorage.setItem(SALT_KEY,btoa(String.fromCharCode(...salt)));
    } else {
      salt=Uint8Array.from(atob(saltB64),c=>c.charCodeAt(0));
    }

    const key=await derivarClave(pass,salt);
    const datosGuardados=localStorage.getItem(STORAGE_KEY);

    if(!datosGuardados){
      // Primera vez — sin datos
      _cryptoKey=key;
      state={clientes:[],activeId:null,tiposPersonalizados:{}};
      await saveSeguro();
      accederApp();
      // Preguntar si quiere importar backup
      setTimeout(()=>{
        const importar=confirm("No se han encontrado datos guardados.\n\n¿Tienes un archivo de backup (.json) que quieras importar?\n\nPulsa OK para seleccionar el archivo, o Cancelar para empezar desde cero.");
        if(importar) document.getElementById("import-file").click();
      },400);
      return;
    }

    // Intentar detectar si los datos están sin cifrar (JSON plano antiguo)
    let esDatosSinCifrar=false;
    try{
      const parsed=JSON.parse(datosGuardados);
      if(parsed&&typeof parsed==="object"&&parsed.clientes!==undefined){
        esDatosSinCifrar=true;
      }
    }catch(e){}

    if(esDatosSinCifrar){
      // Migrar: cifrar los datos existentes con la nueva contraseña
      const datosAntiguos=JSON.parse(datosGuardados);
      state=datosAntiguos;
      if(!state.clientes)state.clientes=[];
      if(!state.tiposPersonalizados)state.tiposPersonalizados={};
      if(state.clientes.length&&!state.activeId)state.activeId=state.clientes[0].id;
      _cryptoKey=key;
      await saveSeguro();
      accederApp();
      setTimeout(()=>alert("✅ Datos migrados y cifrados con tu nueva contraseña.\n\nA partir de ahora necesitarás esta contraseña para acceder."),400);
      return;
    }

    // Datos ya cifrados — intentar descifrar
    const ok=await loadSeguro(key);
    if(ok){
      _cryptoKey=key;
      accederApp();
    } else {
      errEl.textContent="Contraseña incorrecta. Inténtalo de nuevo.";
      document.getElementById("login-pass").value="";
      document.getElementById("login-pass").focus();
    }

  }catch(e){
    errEl.textContent="Error al verificar. Inténtalo de nuevo.";
    console.error(e);
  }finally{
    btn.textContent="Acceder";btn.disabled=false;
  }
}

async function accederApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app-root").style.display="grid";
  // Sincronizar contadores y corregir IDs duplicados
  const idsUsados=new Set();
  state.clientes.forEach(cl=>{
    if(idsUsados.has(cl.id))cl.id=++nCid;
    idsUsados.add(cl.id);
    if(cl.id>=nCid)nCid=cl.id+1;
    (cl.lineas||[]).forEach(l=>{
      if(idsUsados.has(l.id))l.id=++nLid;
      idsUsados.add(l.id);
      if(l.id>=nLid)nLid=l.id+1;
      (l.tramos||[]).forEach(t=>{
        if(idsUsados.has(t.id))t.id=++nTid;
        idsUsados.add(t.id);
        if(t.id>=nTid)nTid=t.id+1;
      });
    });
  });
  // Migrar tramos de renovación sin cap explícito
  state.clientes.forEach(cl=>{
    (cl.lineas||[]).forEach(l=>{
      l.tramos.forEach((t,ti)=>{
        if(ti===0)return;
        if(t.cap==null||t.cap<=0){
          // Usar capIni del tramo anterior como mejor aproximación
          t.cap=capIni(l,ti-1)||l.tramos[0].cap||0;
        }
      });
    });
  });
  // Sincronizar con Firebase si está disponible
  if(window._fbReady&&_cryptoKey){
    try{
      const fbDocRef=window._fbDoc(window._fbDb,"patrimonio","datos");
      const snap=await window._fbGetDoc(fbDocRef);
      if(snap.exists()){
        const fbData=snap.data();
        const localTs=parseInt(localStorage.getItem("patrimonioApp_ts")||"0");
        if(fbData.ts>localTs){
          // Firebase tiene datos más recientes — usar esos
          console.log("Cargando datos desde Firebase (más recientes)");
          const decifrado=await descifrar(fbData.datos,_cryptoKey);
          state=JSON.parse(decifrado);
          localStorage.setItem("patrimonioApp_ts",fbData.ts);
        }
      }
      // Escuchar cambios en tiempo real
      window._fbOnSnapshot(fbDocRef,async snap=>{
        if(!snap.exists())return;
        const fbData=snap.data();
        const localTs=parseInt(localStorage.getItem("patrimonioApp_ts")||"0");
        if(fbData.ts>localTs+1000){
          console.log("Cambio detectado en Firebase — actualizando...");
          try{
            const decifrado=await descifrar(fbData.datos,_cryptoKey);
            state=JSON.parse(decifrado);
            localStorage.setItem("patrimonioApp_ts",fbData.ts);
            renderAll();
          }catch(e){console.warn("Error sincronizando:",e);}
        }
      });
    }catch(e){console.warn("Firebase sync error:",e);}
  }

  // Guardar timestamp en localStorage
  const saveSeguroOrig=saveSeguro;

  // Regenerar comisiones de colaboradores si tienen asignado uno
  try{
    state.clientes.forEach(cl=>{
      if(cl.colaborador&&COLABORADORES_DEF[cl.colaborador]){
        generarComisionesColaborador(cl,COLABORADORES_DEF[cl.colaborador]);
      }
    });
  }catch(e){console.error("Error regenerando comisiones colaborador:",e);}
  const esNuevo=state.clientes.length===0&&!localStorage.getItem("patrimonioApp_welcomed");
  if(esNuevo){
    localStorage.setItem("patrimonioApp_welcomed","1");
    setTimeout(()=>alert("✅ Contraseña configurada.\n\nRecuérdala bien — sin ella no podrás acceder a los datos."),300);
  }
  corregirComisionesErroneas(true); // silencioso al arrancar
  try{
    renderAll();
  }catch(e){
    console.error("Error en renderAll:",e);
    // Intentar renderizar solo el sidebar para que el usuario pueda navegar
    try{renderSidebar();}catch(e2){console.error(e2);}
  }
}

function showModalFusionar(){
  const root=document.getElementById("modal-root");
  const clientes=[...state.clientes].sort((a,b)=>a.nombre.localeCompare(b.nombre,"es"));

  const opts=clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("");

  root.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-width:480px">
    <div class="modal-title">🔀 Fusionar clientes</div>
    <p style="font-size:12px;color:var(--c-text2);margin-bottom:16px">
      Selecciona el cliente a eliminar (origen) y el cliente que quedará con todas sus inversiones (destino). El cliente origen desaparecerá.
    </p>
    <div class="mrow">
      <label>Cliente a eliminar (origen)</label>
      <select id="fus_origen">${opts}</select>
    </div>
    <div style="text-align:center;font-size:20px;margin:4px 0">⬇</div>
    <div class="mrow">
      <label>Cliente que absorbe (destino)</label>
      <select id="fus_destino">${opts}</select>
    </div>
    <div id="fus_preview" style="margin-top:12px;font-size:12px;color:var(--c-text3)"></div>
    <div class="mbtns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn blue" onclick="fusionarClientes()">Fusionar</button>
    </div>
  </div></div>`;

  // Preview al cambiar selección
  const showPreview=()=>{
    const oId=parseInt(document.getElementById("fus_origen").value);
    const dId=parseInt(document.getElementById("fus_destino").value);
    const o=state.clientes.find(c=>c.id===oId);
    const d=state.clientes.find(c=>c.id===dId);
    const prev=document.getElementById("fus_preview");
    if(!o||!d||oId===dId){prev.innerHTML='<span style="color:var(--c-red)">⚠️ Selecciona dos clientes distintos.</span>';return;}
    const nLineas=(o.lineas||[]).length;
    prev.innerHTML=`Las <strong>${nLineas} línea(s)</strong> de <em>${o.nombre}</em> pasarán a <em>${d.nombre}</em>.`;
  };
  document.getElementById("fus_origen").addEventListener("change",showPreview);
  document.getElementById("fus_destino").addEventListener("change",showPreview);
  showPreview();
}

function fusionarClientes(){
  const oId=parseInt(document.getElementById("fus_origen").value);
  const dId=parseInt(document.getElementById("fus_destino").value);
  if(oId===dId){alert("Selecciona dos clientes distintos.");return;}
  const o=state.clientes.find(c=>c.id===oId);
  const d=state.clientes.find(c=>c.id===dId);
  if(!o||!d)return;
  if(!confirm(`¿Fusionar "${o.nombre}" → "${d.nombre}"?\n\nEsta acción no se puede deshacer.`))return;
  // Mover todas las líneas del origen al destino
  (o.lineas||[]).forEach(l=>d.lineas.push(l));
  // Eliminar cliente origen
  state.clientes=state.clientes.filter(c=>c.id!==oId);
  if(state.activeId===oId)state.activeId=dId;
  save();closeModal();renderAll();
  alert(`✅ Clientes fusionados. "${o.nombre}" eliminado, sus inversiones están ahora en "${d.nombre}".`);
}
